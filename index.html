                </div>
            );
        };

        const CharacterSheet = ({ charId, onClose, registerBackHandler, darkMode, toggleDark }) => {
            const [char, setChar] = useState(null);
            const [activeTab, setActiveTab] = useState('main');
            const [showRestModal, setShowRestModal] = useState(false);
            const [showAvatarModal, setShowAvatarModal] = useState(false);
            const [showBgUploadModal, setShowBgUploadModal] = useState(false);
            const [showSpellForm, setShowSpellForm] = useState(false);
            const [showAttackForm, setShowAttackForm] = useState(false);
            const [showBgModal, setShowBgModal] = useState(false);
            const [showNoSlotsModal, setShowNoSlotsModal] = useState(false);
            const [castModalData, setCastModalData] = useState(null);
            const [viewSpell, setViewSpell] = useState(null);
            const [viewAttack, setViewAttack] = useState(null);
            const [previewImage, setPreviewImage] = useState(null);
            const [bgPreviewImage, setBgPreviewImage] = useState(null);

            useEffect(() => {
                DB.getChar(charId).then(saved => {
                    if (saved) { setChar(saved); } else { onClose(); }
                });
            }, [charId]);

            useEffect(() => {
                if (char) {
                    DB.saveChar(charId, char).catch(e => console.error("Error guardando personaje", e));
                    DB.getLibrary().then(library => {
                        const updatedLibrary = library.map(c => c.id === charId ? { ...c, name: char.name, race: char.race, class: char.class, level: char.level } : c);
                        DB.saveLibrary(updatedLibrary);
                    });
                }
            }, [char, charId]);

            if (!char) return <div className="h-full flex items-center justify-center bg-stone-900 text-white">Cargando...</div>;

            const pb = calculateProficiency(char.level);
            const updateStat = (id, val) => setChar(p => ({ ...p, stats: { ...p.stats, [id]: val === "" ? "" : parseInt(val) } }));
            const toggleProficiency = (id) => setChar(p => ({ ...p, proficiencies: p.proficiencies.includes(id) ? p.proficiencies.filter(x => x !== id) : [...p.proficiencies, id] }));
            const toggleSaveProficiency = (id) => setChar(p => ({ ...p, savingThrows: p.savingThrows.includes(id) ? p.savingThrows.filter(x => x !== id) : [...p.savingThrows, id] }));
            const toggleDeathSave = (type, index) => setChar(p => { const current = p.hp.deathSaves?.[type] || 0; const newVal = (index + 1) === current ? index : index + 1; return { ...p, hp: { ...p.hp, deathSaves: { ...(p.hp.deathSaves||{successes:0, failures:0}), [type]: newVal } } }; });
            const handleImageUpload = async (e, isBg = false) => {
                const file = e.target.files[0]; if (!file) return;
                try {
                    if (isBg) { const resizedBg = await resizeImage(file, 1024, 1024, 0.6); setBgPreviewImage(resizedBg); } 
                    else { const resizedAvatar = await resizeImage(file, 300, 300, 0.7); setPreviewImage(resizedAvatar); }
                } catch (error) { alert("Error al procesar la imagen"); }
            };
            const saveAvatar = () => { if (previewImage) { setChar({...char, profileImage: previewImage}); setShowAvatarModal(false); setPreviewImage(null); } };
            const saveBackground = (opacity, transparentBoxes) => { if (bgPreviewImage) setChar({...char, backgroundUrl: bgPreviewImage, bgOpacity: opacity, boxTransparent: transparentBoxes}); else setChar({...char, bgOpacity: opacity, boxTransparent: transparentBoxes}); setShowBgUploadModal(false); setBgPreviewImage(null); };
            const removeBackground = () => { setChar({...char, backgroundUrl: "", bgOpacity: 0, boxTransparent: false}); setShowBgUploadModal(false); setBgPreviewImage(null); };
            const handleShortRest = () => setShowRestModal(false);
            const handleLongRest = () => { setChar(prev => { const newSlots = { ...prev.spellSlots }; Object.keys(newSlots).forEach(k => newSlots[k] = { ...newSlots[k], used: 0 }); return { ...prev, hp: { ...prev.hp, current: prev.hp.max }, spellSlots: newSlots, hp: { ...prev.hp, current: prev.hp.max, hitDiceUsed: Math.max(0, prev.hp.hitDiceUsed - Math.ceil(prev.hp.hitDiceMax / 2)) } }; }); setShowRestModal(false); };
            const castSpell = (spell) => { if (spell.isCantrip) return; const base = parseInt(spell.level); const avail = []; for(let l=base; l<=9; l++) if(char.spellSlots[l] && char.spellSlots[l].used < char.spellSlots[l].total) avail.push(l); if(avail.length===0) return setShowNoSlotsModal(true); if(avail.length===1 && avail[0]===base) spendSlot(base); else setCastModalData({ spell, availableLevels: avail }); }; 
            const spendSlot = (lvl) => setChar(p => ({...p, spellSlots: {...p.spellSlots, [lvl]: {...p.spellSlots[lvl], used: p.spellSlots[lvl].used + 1}}}));
            const selectBackground = (bg) => { if (!bg) { setChar({ ...char, background: "", backgroundFeature: "" }); } else { const featureText = `[${bg.feature}]\n${bg.desc.split('\n\n')[1] || bg.desc}`; const newProfs = [...char.proficiencies]; bg.skills.forEach(skill => { if (!newProfs.includes(skill)) newProfs.push(skill); }); setChar({ ...char, background: bg.name, backgroundFeature: featureText, proficiencies: newProfs }); } setShowBgModal(false); };

            return (
                <div className="relative w-full h-full bg-stone-900">
                    <MobileShell 
                        char={char} setChar={setChar} activeTab={activeTab} setActiveTab={setActiveTab} onClose={onClose}
                        pb={pb} calculateModifier={calculateModifier}
                        updateStat={updateStat} toggleProficiency={toggleProficiency} toggleSaveProficiency={toggleSaveProficiency} toggleDeathSave={toggleDeathSave}
                        decreaseDice={() => setChar(p => ({...p, hp: {...p.hp, hitDiceUsed: Math.min(p.hp.hitDiceMax, p.hp.hitDiceUsed + 1)}}))}
                        increaseDice={() => setChar(p => ({...p, hp: {...p.hp, hitDiceUsed: Math.max(0, p.hp.hitDiceUsed - 1)}}))}
                        showRestModal={showRestModal} setShowRestModal={setShowRestModal}
                        showAvatarModal={showAvatarModal} setShowAvatarModal={setShowAvatarModal}
                        showBgUploadModal={showBgUploadModal} setShowBgUploadModal={setShowBgUploadModal}
                        showSpellForm={showSpellForm} setShowSpellForm={setShowSpellForm}
                        showAttackForm={showAttackForm} setShowAttackForm={setShowAttackForm}
                        showBgModal={showBgModal} setShowBgModal={setShowBgModal}
                        showNoSlotsModal={showNoSlotsModal} setShowNoSlotsModal={setShowNoSlotsModal}
                        castModalData={castModalData} setCastModalData={setCastModalData}
                        viewSpell={viewSpell} setViewSpell={setViewSpell}
                        viewAttack={viewAttack} setViewAttack={setViewAttack}
                        viewSpellDetail={setViewSpell} viewAttackDetail={setViewAttack}
                        previewImage={previewImage} setPreviewImage={setPreviewImage}
                        bgPreviewImage={bgPreviewImage} setBgPreviewImage={setBgPreviewImage}
                        handleImageUpload={handleImageUpload} saveAvatar={saveAvatar} saveBackground={saveBackground} removeBackground={removeBackground}
                        handleShortRest={handleShortRest} handleLongRest={handleLongRest}
                        castSpell={castSpell} spendSlot={spendSlot} selectBackground={selectBackground}
                        registerBackHandler={registerBackHandler}
                        darkMode={darkMode} toggleDark={toggleDark}
                    />
                    <DiceRoller registerBackHandler={registerBackHandler} />
                </div>
            );
        };

        const MainMenu = ({ onChangeView, library, onDeleteChar, darkMode, toggleDark }) => {
            const [deleteTarget, setDeleteTarget] = useState(null);
            
            return (
                <div className="flex flex-col h-full bg-stone-900 text-white p-6 overflow-hidden relative">
                    {/* Botón modo oscuro/claro */}
                    <div className="absolute top-6 right-6 z-10">
                        <button className="dark-toggle" onClick={toggleDark} title={darkMode ? 'Modo claro' : 'Modo oscuro'}>
                            {darkMode
                                ? <svg viewBox="0 0 24 24" width="20" height="20" fill="#fbbf24" stroke="#fbbf24" strokeWidth="1.5"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                                : <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#d97706" strokeWidth="1.5"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                            }
                        </button>
                    </div>
                    <div className="flex-1 flex flex-col items-center justify-center animate-fade-in relative w-full">
                        <div className="mb-8 text-6xl">⚔️</div>
                        <h1 className="text-4xl font-serif font-bold text-center mb-2 tracking-widest text-amber-500">LA FORJA</h1>
                        <p className="text-sm text-stone-500 uppercase tracking-widest mb-12">Gestor 5e</p>
                        <button onClick={() => onChangeView('create')} className="w-full max-w-xs bg-red-800 hover:bg-red-700 text-white py-4 rounded-lg font-bold shadow-lg mb-6 flex items-center justify-center gap-3 transition-transform active:scale-95 border border-red-900">
                            <Icons.Plus size={24} /> NUEVO PERSONAJE
                        </button>
                        <button onClick={() => onChangeView('library')} className="w-full max-w-xs bg-indigo-800 hover:bg-indigo-700 text-white py-4 rounded-lg font-bold shadow-lg mb-6 flex items-center justify-center gap-3 transition-transform active:scale-95 border border-indigo-900">
                            <Icons.Library size={24} /> BIBLIOTECA
                        </button>
                        <div className="w-full max-w-xs relative group">
                            <div className="max-h-[40vh] overflow-y-auto pr-2 no-scrollbar space-y-3 pb-8">
                                {library.length === 0 && <p className="text-center text-stone-600 italic">No hay personajes guardados.</p>}
                                {library.map(char => (
                                    <div key={char.id} className="bg-stone-800 border border-stone-700 rounded-lg p-3 flex justify-between items-center group hover:border-stone-500 transition-colors">
                                        <div className="cursor-pointer flex-1" onClick={() => onChangeView('sheet', char.id)}>
                                            <div className="font-serif font-bold text-lg text-stone-200">{char.name || "Sin Nombre"}</div>
                                            <div className="text-xs text-stone-500">{char.race} {char.class} • Nvl {char.level}</div>
                                        </div>
                                        <button onClick={(e) => { e.stopPropagation(); setDeleteTarget(char.id); }} className="text-stone-600 hover:text-red-500 p-2"> <Icons.Trash size={18} /> </button>
                                    </div>
                                ))}
                            </div>
                            {library.length > 3 && <div className="absolute bottom-0 left-0 right-0 h-12 bg-gradient-to-t from-stone-900 to-transparent pointer-events-none"></div>}
                        </div>
                    </div>
                    <div className="mt-auto flex justify-between items-center text-stone-600 pt-6 border-t border-stone-800"> <button onClick={() => onChangeView('about')} className="flex items-center gap-2 hover:text-stone-300 transition-colors text-xs font-bold uppercase"><Icons.Info size={16}/> Acerca de</button> <div className="text-[10px] opacity-50">{CURRENT_VERSION}</div> </div>
                    {deleteTarget && ( <div className="absolute inset-0 bg-black/90 flex items-center justify-center p-6 z-50 animate-fade-in"> <div className="bg-stone-800 border border-stone-600 p-6 rounded-lg text-center w-full max-w-sm shadow-2xl"> <h3 className="text-xl font-serif font-bold text-red-500 mb-2">¿Eliminar Héroe?</h3> <p className="text-stone-400 text-sm mb-6">Esta acción no se puede deshacer.</p> <div className="flex gap-3"> <button onClick={() => setDeleteTarget(null)} className="flex-1 py-3 border border-stone-600 rounded text-stone-400 font-bold">Cancelar</button> <button onClick={() => { onDeleteChar(deleteTarget); setDeleteTarget(null); }} className="flex-1 py-3 bg-red-700 text-white rounded font-bold">Eliminar</button> </div> </div> </div> )}
                </div>
            );
        };

        const AboutScreen = ({ onBack }) => {
            return (
                <div className="h-full bg-stone-900 text-stone-300 p-6 overflow-y-auto">
                    <button onClick={onBack} className="mb-6 flex items-center gap-2 text-stone-500 hover:text-white"><Icons.ArrowLeft /> Volver</button>
                    <h2 className="text-2xl font-serif font-bold text-amber-500 mb-4">Acerca de La Forja</h2>
                    <p className="mb-4 text-lg leading-relaxed"> Desarrollado por <strong className="text-white">{DEV_TAG}</strong>.<br/>Una herramienta creada por fans para fans, diseñada para facilitar la gestión de personajes en tus partidas de rol de mesa. </p>
                    <div className="bg-stone-950 p-4 rounded-lg border border-stone-800 text-xs text-stone-500 leading-normal mb-8"> <h3 className="font-bold text-stone-400 mb-2 uppercase">Licencia & Copyright</h3> <p className="mb-2"> This work includes material taken from the System Reference Document 5.1 (“SRD 5.1”) by Wizards of the Coast LLC and available at https://dnd.wizards.com/resources/systems-reference-document. </p> <p> The SRD 5.1 is licensed under the Creative Commons Attribution 4.0 International License available at https://creativecommons.org/licenses/by/4.0/legalcode. </p> </div>
                    <div className="text-center text-xs text-stone-600"> ¡Que tus tiradas sean naturales de 20! 🎲 </div>
                </div>
            );
        };

        function App() {
            const [view, setView] = useState('menu'); 
            const [library, setLibrary] = useState([]);
            const [activeCharId, setActiveCharId] = useState(null);
            const [darkMode, setDarkMode] = useState(false);
            
            // Aplicar/quitar clase dark-mode al body
            useEffect(() => {
                if (darkMode) {
                    document.body.classList.add('dark-mode');
                } else {
                    document.body.classList.remove('dark-mode');
                }
                DB.setSetting('forja_dark_mode', darkMode);
            }, [darkMode]);

            const toggleDark = () => setDarkMode(d => !d);
            
            const viewRef = useRef(view);
            const childBackHandlerRef = useRef(null);

            useEffect(() => {
                viewRef.current = view;
            }, [view]);

            useEffect(() => {
                const init = async () => {
                    // Migrar desde localStorage si es la primera vez
                    await DB.migrateFromLocalStorage();

                    // Cargar preferencia de modo oscuro
                    const savedDark = await DB.getSetting('forja_dark_mode');
                    if (savedDark) setDarkMode(true);

                    const loadedLib = await DB.getLibrary();
                    setLibrary(loadedLib);

                    // Migración desde versión antigua dnd_char_v3
                    const oldDataString = localStorage.getItem('dnd_char_v3');
                    if (oldDataString) {
                        const oldCharId = 'legacy_import';
                        const alreadyExists = loadedLib.find(c => c.id === oldCharId);
                        if (!alreadyExists) {
                            try {
                                const oldChar = JSON.parse(oldDataString);
                                const newLibraryItem = { id: oldCharId, name: oldChar.name || "Héroe Importado", race: oldChar.race || "Desconocido", class: oldChar.class || "Desconocido", level: oldChar.level || 1 };
                                const v10Defaults = {
                                    name: 'Nuevo Héroe', class: 'Guerrero', race: 'Humano', background: '', backgroundFeature: '', level: 1, backgroundUrl: DEFAULT_BG,
                                    profileImage: null, bgOpacity: 0, boxTransparent: false, alignment: '',
                                    stats: { str: 10, dex: 10, con: 10, int: 10, wis: 10, cha: 10 },
                                    proficiencies: [], savingThrows: [],
                                    hp: { current: 10, max: 10, temp: 0, hitDice: '1d10', hitDiceMax: 1, hitDiceUsed: 0, deathSaves: { successes: 0, failures: 0 } },
                                    ac: 10, speed: 30, initiativeBonus: 0,
                                    attacks: [], spells: [], inventory: '', notes: '',
                                    money: { cp: 0, sp: 0, ep: 0, gp: 0, pp: 0 },
                                    inspiration: 0, languages: '',
                                    spellSlots: { 1: {total:0, used:0}, 2: {total:0, used:0}, 3: {total:0, used:0}, 4: {total:0, used:0}, 5: {total:0, used:0}, 6: {total:0, used:0}, 7: {total:0, used:0}, 8: {total:0, used:0}, 9: {total:0, used:0} }
                                };
                                const migratedChar = { ...v10Defaults, ...oldChar, stats: { ...v10Defaults.stats, ...(oldChar.stats || {}) }, hp: { ...v10Defaults.hp, ...(oldChar.hp || {}) }, money: { ...v10Defaults.money, ...(oldChar.money || {}) }, spellSlots: { ...v10Defaults.spellSlots, ...(oldChar.spellSlots || {}) }, id: oldCharId };
                                await DB.saveChar(oldCharId, migratedChar);
                                const updatedLib = [...loadedLib, newLibraryItem];
                                await DB.saveLibrary(updatedLib);
                                setLibrary(updatedLib);
                                alert("¡Se ha encontrado y recuperado un héroe de la versión antigua!");
                            } catch (e) { console.error("Error migrando personaje antiguo:", e); }
                        }
                    }

                    const loader = document.getElementById('app-loader');
                    if (loader) { setTimeout(() => { loader.classList.add('loaded'); setTimeout(() => loader.style.display = 'none', 500); }, 800); }
                };
                init();
            }, []);

            useEffect(() => {
                const handleHardwareBack = async () => {
                    const currentView = viewRef.current; // Leer la referencia actualizada

                    // NIVEL 1: Modales de hijos (referencia mutable, siempre actual)
                    if (childBackHandlerRef.current) {
                        const handled = childBackHandlerRef.current();
                        if (handled) return; // Si el hijo manejó el evento (cerró un modal), no hacemos nada más.
                    }

                    // NIVEL 2: Navegación de Vistas
                    if (currentView !== 'menu') {
                        // Si estoy en Hoja, Library o About -> Vuelvo al menú
                        setActiveCharId(null);
                        childBackHandlerRef.current = null; // Limpiamos la referencia al salir
                        setView('menu');
                        // Hack para PWA/Android WebView para evitar cierre forzoso si no es Capacitor puro
                        if(window.history.pushState) {
                             window.history.pushState(null, '', window.location.pathname);
                        }
                    } 
                    // NIVEL 3: Salir de la App
                    else {
                        if (window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.App) {
                            await window.Capacitor.Plugins.App.exitApp();
                        }
                    }
                };

                const setupListener = async () => {
                    if (window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.App) {
                        const { App } = window.Capacitor.Plugins;
                        // Borramos cualquier listener previo para evitar duplicados
                        await App.removeAllListeners('backButton');
                        // Agregamos NUESTRO listener maestro
                        await App.addListener('backButton', handleHardwareBack);
                    }
                };

                setupListener();

                // Limpieza al desmontar (aunque App rara vez se desmonta)
                return () => {
                    if (window.Capacitor?.Plugins?.App) {
                        window.Capacitor.Plugins.App.removeAllListeners('backButton');
                    }
                };
            }, []);

            const handleCreateChar = async () => {
                const newId = Date.now().toString();
                const newCharStub = { id: newId, name: "Nuevo Héroe", race: "Humano", class: "Guerrero", level: 1 };
                const newLibrary = [...library, newCharStub];
                setLibrary(newLibrary);
                await DB.saveLibrary(newLibrary);
                
                const defaults = {
                    name: 'Nuevo Héroe', class: 'Guerrero', race: 'Humano', background: '', backgroundFeature: '', level: 1, backgroundUrl: DEFAULT_BG,
                    profileImage: null, bgOpacity: 0, boxTransparent: false, alignment: '',
                    stats: { str: 10, dex: 10, con: 10, int: 10, wis: 10, cha: 10 },
                    proficiencies: [], savingThrows: [],
                    hp: { current: 10, max: 10, temp: 0, hitDice: '1d10', hitDiceMax: 1, hitDiceUsed: 0, deathSaves: { successes: 0, failures: 0 } },
                    ac: 10, speed: 30, initiativeBonus: 0,
                    attacks: [], spells: [], inventory: '', notes: '',
                    money: { cp: 0, sp: 0, ep: 0, gp: 0, pp: 0 },
                    inspiration: 0, languages: '',
                    spellSlots: { 1: {total:0, used:0}, 2: {total:0, used:0}, 3: {total:0, used:0}, 4: {total:0, used:0}, 5: {total:0, used:0}, 6: {total:0, used:0}, 7: {total:0, used:0}, 8: {total:0, used:0}, 9: {total:0, used:0} }
                };
                await DB.saveChar(newId, defaults);
                setActiveCharId(newId);
                setView('sheet');
            };

            const handleDeleteChar = async (id) => {
                const newLibrary = library.filter(c => c.id !== id);
                setLibrary(newLibrary);
                await DB.saveLibrary(newLibrary);
                await DB.deleteChar(id);
            };

            const handleOpenChar = (id) => { setActiveCharId(id); setView('sheet'); };
            const refreshLibrary = async () => { const loadedLib = await DB.getLibrary(); setLibrary(loadedLib); };

            return (
                <div className="h-full w-full bg-stone-900">
                    {view === 'menu' && ( 
                        <MainMenu 
                            onChangeView={(v, id) => { if (v === 'create') handleCreateChar(); else if (v === 'sheet') handleOpenChar(id); else setView(v); }} 
                            library={library} 
                            onDeleteChar={handleDeleteChar}
                            darkMode={darkMode} toggleDark={toggleDark}
                        /> 
                    )}
                    {view === 'about' && <AboutScreen onBack={() => setView('menu')} />}
                    {view === 'library' && <LibraryManager onClose={() => setView('menu')} />}
                    {view === 'sheet' && activeCharId && ( <CharacterSheet charId={activeCharId} onClose={() => { refreshLibrary(); setActiveCharId(null); setView('menu'); }} registerBackHandler={(fn) => { childBackHandlerRef.current = fn; }} darkMode={darkMode} toggleDark={toggleDark} /> )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
