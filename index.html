    <!-- ESTILOS -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Lato:wght@400;700&display=swap');
        
        html { background-color: #292524; height: 100%; }
        body { 
            font-family: 'Lato', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            overscroll-behavior-y: none; user-select: none; -webkit-user-select: none;
            background-color: #292524; margin: 0; padding: 0;
            height: 100dvh; width: 100%; overflow: hidden;
        }
        h1, h2, h3, .font-serif { font-family: 'Cinzel', Georgia, 'Times New Roman', serif; }
        input, textarea { user-select: text; -webkit-user-select: text; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 16px; width: 16px; border-radius: 50%; background: #4f46e5; cursor: pointer; margin-top: -6px; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 4px; cursor: pointer; background: #d6d3d1; border-radius: 2px; }

        #app-loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: #292524;
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999;
            transition: opacity 0.5s ease-out;
        }
        .loader-icon { font-size: 80px; animation: pulse 2s infinite; }
        .loader-text { color: #f5f5f4; font-family: 'Cinzel', serif; margin-top: 20px; font-size: 18px; letter-spacing: 2px; }
        .loader-subtext { color: #a8a29e; font-size: 12px; margin-top: 10px; min-height: 18px; transition: opacity 0.3s; }
        .loader-bar-wrap { width: 200px; height: 4px; background: #44403c; border-radius: 2px; margin-top: 18px; overflow: hidden; }
        .loader-bar { height: 100%; width: 0%; background: #d97706; border-radius: 2px; transition: width 0.12s ease-out; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.1); opacity: 0.7; } 100% { transform: scale(1); opacity: 1; } }
        .loaded { opacity: 0; pointer-events: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
        .modal-backdrop { animation: fadeIn 0.2s ease-out forwards; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #d6d3d1; border-radius: 2px; }

        /* === LANZADOR DE DADOS === */
        @keyframes diceRoll {
            0%   { transform: perspective(400px) rotateX(0deg) rotateY(0deg) rotateZ(0deg) scale(1); filter: drop-shadow(0 4px 12px rgba(0,0,0,0.5)); }
            15%  { transform: perspective(400px) rotateX(180deg) rotateY(90deg) rotateZ(45deg) scale(1.2); filter: drop-shadow(0 12px 24px rgba(0,0,0,0.7)); }
            35%  { transform: perspective(400px) rotateX(360deg) rotateY(270deg) rotateZ(120deg) scale(1.3); filter: drop-shadow(0 16px 32px rgba(0,0,0,0.8)); }
            55%  { transform: perspective(400px) rotateX(540deg) rotateY(180deg) rotateZ(200deg) scale(1.2); filter: drop-shadow(0 10px 20px rgba(0,0,0,0.6)); }
            75%  { transform: perspective(400px) rotateX(630deg) rotateY(300deg) rotateZ(280deg) scale(1.1); filter: drop-shadow(0 6px 14px rgba(0,0,0,0.5)); }
            90%  { transform: perspective(400px) rotateX(680deg) rotateY(340deg) rotateZ(310deg) scale(1.05); filter: drop-shadow(0 4px 10px rgba(0,0,0,0.4)); }
            100% { transform: perspective(400px) rotateX(720deg) rotateY(360deg) rotateZ(360deg) scale(1); filter: drop-shadow(0 2px 6px rgba(0,0,0,0.3)); }
        }
        @keyframes resultPop {
            0%   { transform: scale(0.5); opacity: 0; }
            60%  { transform: scale(1.15); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to   { transform: translateY(0); }
        }
        @keyframes fabPulse {
            0%   { transform: scale(1); }
            50%  { transform: scale(1.08); }
            100% { transform: scale(1); }
        }
        .dice-rolling { animation: diceRoll 0.9s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards; }
        .result-pop   { animation: resultPop 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
        .dice-panel   { animation: slideUp 0.3s cubic-bezier(0.34, 1.1, 0.64, 1) forwards; }
        .fab-pulse    { animation: fabPulse 0.3s ease-out; }

            --sheet-bg:        #1e1c1b;
            --sheet-bg2:       #252220;
            --sheet-bg3:       #2a2724;
            --card-bg:         #2e2b28;
            --card-border:     #3d3a36;
            --text-primary:    #e7e5e2;

            --text-muted:      #78716c;
            --input-bg:        #252220;
            --input-border:    #44403c;
            --modal-bg:        #2e2b28;
            --divider:         #3d3a36;
            --tag-bg:          #3d3a36;

            --indigo-text:     #a5b4fc;
            --red-soft:        #2d0a0a;

        /* Aplicar variables a clases Tailwind usadas en la ficha */
        .dm-bg        { background-color: var(--sheet-bg) !important; }
        .dm-bg2       { background-color: var(--sheet-bg2) !important; }
        .dm-card      { background-color: var(--card-bg) !important; border-color: var(--card-border) !important; }
        .dm-text      { color: var(--text-primary) !important; }
        .dm-text2     { color: var(--text-secondary) !important; }
        .dm-muted     { color: var(--text-muted) !important; }
        .dm-input     { background-color: var(--input-bg) !important; border-color: var(--input-border) !important; color: var(--text-primary) !important; }
        .dm-modal     { background-color: var(--modal-bg) !important; }
        .dm-divider   { border-color: var(--divider) !important; }
        .dm-tag       { background-color: var(--tag-bg) !important; }
        .dm-indigo    { background-color: var(--indigo-soft) !important; color: var(--indigo-text) !important; }
        .dm-red       { background-color: var(--red-soft) !important; color: var(--red-text) !important; }

        /* Botón de modo */
        .dark-toggle {
            width: 40px; height: 40px; border-radius: 50%;
            border: 2px solid #d97706;
            background: transparent;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: background 0.3s, transform 0.2s;
            flex-shrink: 0;
        }
        .dark-toggle:active { transform: scale(0.9); }
        body.dark-mode .dark-toggle { background: #292218; }
    </style>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const CURRENT_VERSION = "v15.0 Character Wizard";
        const DEV_TAG = "Evionail";
        const LIBRARY_SIGNATURE = "R4C1N3EV10N41L"; 
        const DEFAULT_BG = "";

        // ============================================================
        // SCHEMA V2 — Personaje completo con SRD
        // Este es el contrato entre la Biblioteca y la Ficha.
        // NUNCA cambiar campos existentes — solo agregar nuevos.
        // ============================================================
        const DEFAULT_CHAR_V2 = {
            // ── Identidad ─────────────────────────────────
            id:               '',
            name:             'Nuevo Héroe',
            alignment:        '',
            languages:        '',

            // ── Raza — snapshot del SRD (siempre editable) ─
            race_data: {
                index:              '',       // "elf"
                name:               '',       // "Elfo"
                size:               '',       // "Mediano"
                speed:              30,
                traits:             [],       // [{index, name}]
                subspecies_options: [],       // [{index, name}] disponibles
            },

            // ── Subraza — snapshot del SRD ────────────────
            subrace_data: {
                index:  '',
                name:   '',
                traits: [],
            },

            // ── Clase — snapshot del SRD ──────────────────
            class_data: {
                index:            '',         // "fighter"
                name:             '',         // "Guerrero"
                hit_die:          10,
                proficiencies:    [],         // [{index, name}]
                saving_throws:    [],         // ["str", "con"]
                subclass_options: [],         // [{index, name}]
            },

            // ── Trasfondo — snapshot del SRD ──────────────
            background_data: {
                index:           '',
                name:            '',
                feature:         '',          // texto del rasgo
                feature_name:    '',          // nombre del rasgo
                proficiencies:   [],          // skills ganadas
                languages:       0,           // nº idiomas a elegir
                ability_bonuses: [],          // [{ability, bonus}] — editable
            },

            // ── Campos legacy — compatibilidad hacia atrás ─
            // Se mantienen para no romper personajes existentes
            class:             'Guerrero',
            race:              'Humano',
            background:        '',
            backgroundFeature: '',

            // ── Stats ─────────────────────────────────────
            level:  1,
            stats:  { str:10, dex:10, con:10, int:10, wis:10, cha:10 },
            proficiencies:  [],
            savingThrows:   [],

            // ── Combate ───────────────────────────────────
            ac:              10,
            speed:           30,
            initiativeBonus: 0,
            inspiration:     0,
            hp: {
                current: 10, max: 10, temp: 0,
                hitDice: '1d10', hitDiceMax: 1, hitDiceUsed: 0,
                deathSaves: { successes: 0, failures: 0 }
            },

            // ── Ataques y Hechizos ────────────────────────
            // source: 'srd' | 'homebrew' | 'manual'
            attacks: [],
            spells:  [],

            // ── Spell Slots ───────────────────────────────
            spellSlots: {
                1:{total:0,used:0}, 2:{total:0,used:0}, 3:{total:0,used:0},
                4:{total:0,used:0}, 5:{total:0,used:0}, 6:{total:0,used:0},
                7:{total:0,used:0}, 8:{total:0,used:0}, 9:{total:0,used:0}
            },

            // ── Condiciones activas ───────────────────────
            // Solo índices — descripción se lee de srd_conditions en IndexedDB
            conditions: [],   // ["poisoned", "grappled"]

            // ── Dotes ─────────────────────────────────────
            feats: [],        // [{index, name, source: 'srd'|'homebrew'}]

            // ── Inventario y notas ────────────────────────
            inventory:  '',
            notes:      '',
            money: { cp:0, sp:0, ep:0, gp:0, pp:0 },

            // ── Visual ────────────────────────────────────
            profileImage:   null,
            backgroundUrl:  '',
            bgOpacity:      0,
            boxTransparent: false,

            // ── Meta ──────────────────────────────────────
            meta: {
                version:      2,
                mode:         'simple',   // 'simple' | 'expert'
                createdAt:    '',         // ISO string
                lastModified: {
                    stats:      '',
                    combat:     '',
                    spells:     '',
                    inventory:  '',
                    race:       '',
                    class_:     '',
                }
            }
        };

        // ============================================================
        // MIGRACIÓN — Actualiza personajes existentes al schema V2
        // Solo agrega campos nuevos, NUNCA sobreescribe los existentes.
        // Es seguro correrla múltiples veces (idempotente).
        // ============================================================

        // ── Adapter del Character Wizard a la hoja ──────────────
        // El Wizard produce un char con campos planos (hp:Number, avatar:String,
        // spells:{cantrips,known}, inventory:Array) mientras que la hoja espera
        // hp:Object, profileImage:String, spells:Array, inventory:String.
        // Esta función normaliza el primero al formato del segundo.
        //
        // SEGURO DE LLAMAR MÚLTIPLES VECES: las transformaciones de tipo solo
        // ocurren si la forma del campo coincide con la del Wizard.
        // Las asignaciones de defaults siempre se ejecutan (idempotente).
        function migrateCharFromWizard(char) {
            if (!char) return char;

            const adapted = { ...char };

            // ── PARTE 1: Transformaciones de Wizard → Sheet ──
            // (solo si el char realmente vino del Wizard)
            if (char.meta?.wizardUsed && !char.meta?.sheetAdapted) {

                // ── Avatar → profileImage ──
                if (char.avatar && !char.profileImage) {
                    adapted.profileImage = char.avatar;
                }

                // ── HP número → objeto ──
                if (typeof char.hp === 'number') {
                    adapted.hp = {
                        current:     char.hp,
                        max:         char.hpMax || char.hp,
                        temp:        char.hpTemp || 0,
                        hitDice:     '1d' + (char.class_data?.hit_die || 10),
                        hitDiceMax:  char.hitDiceTotal || char.level || 1,
                        hitDiceUsed: char.hitDiceUsed || 0,
                        deathSaves:  char.deathSaves || { successes: 0, failures: 0 },
                    };
                }

                // ── Initiative bonus ──
                if (char.initiative !== undefined && char.initiativeBonus === undefined) {
                    adapted.initiativeBonus = char.initiative;
                }

                // ── Spells: {cantrips, known} → array plano con flags ──
                if (char.spells && (char.spells.cantrips || char.spells.known)) {
                    const cantrips = (char.spells.cantrips || []).map(s => ({
                        id:       'sp_' + (s.index || Date.now()) + '_' + Math.random().toString(36).slice(2,6),
                        index:    s.index || '',
                        name:     s.name || '',
                        level:    0,
                        source:   s.source || 'srd',
                        prepared: s.prepared !== false,
                    }));
                    const known = (char.spells.known || []).map(s => ({
                        id:       'sp_' + (s.index || Date.now()) + '_' + Math.random().toString(36).slice(2,6),
                        index:    s.index || '',
                        name:     s.name || '',
                        level:    s.level || 1,
                        source:   s.source || 'srd',
                        prepared: s.prepared || false,
                    }));
                    adapted.spells = [...cantrips, ...known];
                    adapted._spellMeta = {
                        ability:     char.spells.ability,
                        saveDC:      char.spells.saveDC,
                        attackBonus: char.spells.attackBonus,
                    };
                }

                // ── Inventory: array → string descriptivo ──
                if (Array.isArray(char.inventory)) {
                    if (char.inventory.length === 0) {
                        adapted.inventory = '';
                    } else {
                        adapted.inventory = char.inventory.map(it => {
                            const qty = it.quantity && it.quantity > 1 ? ` ×${it.quantity}` : '';
                            return `• ${it.name}${qty}`;
                        }).join('\n');
                    }
                }
            }

            // ── PARTE 2: Defaults defensivos (SIEMPRE se ejecutan) ──
            // Garantiza que los campos que la hoja consume existan,
            // incluso en chars antiguos del Wizard que se guardaron sin ellos.

            // Spell slots: la hoja espera 9 entradas {total, used}
            const validSlots = adapted.spellSlots
                && typeof adapted.spellSlots === 'object'
                && adapted.spellSlots[1]
                && typeof adapted.spellSlots[1].total === 'number';
            if (!validSlots) {
                adapted.spellSlots = {
                    1:{total:0,used:0}, 2:{total:0,used:0}, 3:{total:0,used:0},
                    4:{total:0,used:0}, 5:{total:0,used:0}, 6:{total:0,used:0},
                    7:{total:0,used:0}, 8:{total:0,used:0}, 9:{total:0,used:0}
                };
            }

            // Asegurar arrays
            if (!Array.isArray(adapted.attacks))     adapted.attacks     = [];
            if (!Array.isArray(adapted.spells))      adapted.spells      = [];
            if (!Array.isArray(adapted.conditions))  adapted.conditions  = [];
            if (!Array.isArray(adapted.feats))       adapted.feats       = [];
            if (!Array.isArray(adapted.proficiencies)) adapted.proficiencies = [];
            if (!Array.isArray(adapted.savingThrows))  adapted.savingThrows  = [];

            // Asegurar HP como objeto
            if (!adapted.hp || typeof adapted.hp !== 'object') {
                adapted.hp = {
                    current: 10, max: 10, temp: 0,
                    hitDice: '1d10', hitDiceMax: 1, hitDiceUsed: 0,
                    deathSaves: { successes: 0, failures: 0 }
                };
            }
            if (!adapted.hp.deathSaves) {
                adapted.hp.deathSaves = { successes: 0, failures: 0 };
            }

            // Asegurar stats
            if (!adapted.stats || typeof adapted.stats !== 'object') {
                adapted.stats = { str:10, dex:10, con:10, int:10, wis:10, cha:10 };
            }

            // Asegurar money
            if (!adapted.money) {
                adapted.money = { cp:0, sp:0, ep:0, gp:0, pp:0 };
            }

            // Campos primitivos con default
            if (adapted.inspiration   === undefined) adapted.inspiration   = 0;
            if (adapted.ac            === undefined) adapted.ac            = 10;
            if (adapted.speed         === undefined) adapted.speed         = 30;
            if (adapted.initiativeBonus === undefined) adapted.initiativeBonus = 0;
            if (adapted.backgroundUrl === undefined) adapted.backgroundUrl = '';
            if (adapted.bgOpacity     === undefined) adapted.bgOpacity     = 0;
            if (adapted.boxTransparent === undefined) adapted.boxTransparent = false;
            if (adapted.notes         === undefined) adapted.notes         = '';
            if (adapted.languages     === undefined) adapted.languages     = '';
            if (typeof adapted.inventory !== 'string') adapted.inventory   = '';

            // Marcar como adaptado
            adapted.meta = {
                ...(adapted.meta || {}),
                sheetAdapted: true,
            };

            return adapted;
        }

        // ── Enriquecer hechizos del char con datos completos del SRD ──
        // Los hechizos creados por el Wizard solo tienen {id, index, name, level, source, prepared}.
        // Esta función los carga desde IndexedDB y completa: school, components,
        // concentration, ritual, duration, range, casting_time, damage, description,
        // higher_level, classes. Solo enriquece los que les falta info.
        async function enrichSpellsFromSRD(char) {
            if (!char || !Array.isArray(char.spells) || char.spells.length === 0) return char;

            // ¿Hay algún hechizo que necesite enriquecimiento?
            // Indicador: tiene `index` pero NO tiene `school` (clave detalles SRD)
            const needsEnrich = char.spells.some(s =>
                s.index && !s.school && !s.duration && !s.components?.length
            );
            if (!needsEnrich) return char;

            try {
                const srdSpells = (await DB.getSRD('srd_spells')) || [];
                let brewSpells = [];
                try { brewSpells = (await DB.getSetting('lm_brew_b_srd_spells')) || []; } catch(e) {}
                const allByIndex = {};
                [...srdSpells, ...brewSpells].forEach(s => {
                    if (s.index) allByIndex[s.index] = s;
                });

                const enrichedSpells = char.spells.map(spell => {
                    // Si ya tiene info, no tocar
                    if (spell.school || spell.duration || (spell.components && spell.components.length)) {
                        return spell;
                    }
                    // Buscar en SRD por index
                    if (!spell.index) return spell;
                    const srdSpell = allByIndex[spell.index];
                    if (!srdSpell) return spell;

                    // Fusionar: campos legacy del char + campos enriquecidos del SRD
                    const lvl = typeof srdSpell.level === 'number' ? srdSpell.level : spell.level;
                    return {
                        ...spell,
                        level:        lvl,
                        isCantrip:    lvl === 0,
                        time:         spell.time || srdSpell.casting_time || '',
                        range:        spell.range || srdSpell.range || '',
                        damage:       spell.damage || (srdSpell.damage?.damage_dice
                                          ? `${srdSpell.damage.damage_dice}${srdSpell.damage.damage_type?.name ? ' ' + srdSpell.damage.damage_type.name : ''}`
                                          : ''),
                        description:  spell.description || (Array.isArray(srdSpell.desc) ? srdSpell.desc.join('\n\n') : (srdSpell.desc || '')),
                        // Campos enriquecidos
                        school:        srdSpell.school || null,
                        components:    srdSpell.components || [],
                        material:      srdSpell.material || '',
                        concentration: !!srdSpell.concentration,

        // Abre DB con todos los stores del SRD incluidos
        function openDB() {
            return new Promise((resolve, reject) => {
                const req = indexedDB.open('forja_db', 3); // versión 3 — agrega srd_spells
                req.onupgradeneeded = e => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains('characters')) db.createObjectStore('characters');
                    if (!db.objectStoreNames.contains('settings'))   db.createObjectStore('settings');
                    // Stores del SRD
                    SRD_FILES.forEach(({ store }) => {
                        if (!db.objectStoreNames.contains(store)) db.createObjectStore(store);
                    });
                };
                req.onsuccess = e => resolve(e.target.result);
                req.onerror   = e => reject(e.target.error);
            });
        }

        // Helpers de lectura/escritura
        function dbGet(store, key) {
            return openDB().then(db => new Promise((resolve, reject) => {
                const req = db.transaction(store,'readonly').objectStore(store).get(key);
                req.onsuccess = e => resolve(e.target.result);
                req.onerror   = e => reject(e.target.error);
            }));
        }
        function dbPut(store, key, value) {
            return openDB().then(db => new Promise((resolve, reject) => {
                const req = db.transaction(store,'readwrite').objectStore(store).put(value, key);
                req.onsuccess = e => resolve(e.target.result);
                req.onerror   = e => reject(e.target.error);
            }));
        }
        function dbDelete(store, key) {
            return openDB().then(db => new Promise((resolve, reject) => {
                const req = db.transaction(store,'readwrite').objectStore(store).delete(key);
                req.onsuccess = e => resolve(e.target.result);
                req.onerror   = e => reject(e.target.error);
            }));
        }

                if (done) return;
                const rawLib = localStorage.getItem('forja_library');
                if (rawLib) await DB.saveLibrary(JSON.parse(rawLib));
                const lib = await DB.getLibrary();
                for (const item of lib) {
                    const raw = localStorage.getItem(`forja_char_${item.id}`);
                    if (raw) await DB.saveChar(item.id, JSON.parse(raw));
                }
                const rawMaster = localStorage.getItem('forja_library_master');

                const tutorial = localStorage.getItem('forja_library_tutorial_seen');

                const done = await DB.getSetting('srd_loaded_v2');
                if (done) return;

                for (let i = 0; i < SRD_FILES.length; i++) {
                    const { file, store } = SRD_FILES[i];
                    if (onProgress) onProgress(i, SRD_FILES.length, file);
                    try {
                        const res  = await fetch(SRD_BASE + file);
                        const data = await res.json();
                        const db   = await openDB();
                        const tx   = db.transaction(store, 'readwrite');
                        const os   = tx.objectStore(store);
                        os.clear();
                        data.forEach((item, idx) => os.put(item, item.index || idx));
                        await new Promise((res, rej) => { tx.oncomplete = res; tx.onerror = rej; });
                    } catch(e) {
                        console.warn(`[SRD] Error cargando ${file}:`, e);
                    }
                }
                await DB.setSetting('srd_loaded_v2', true);
                if (onProgress) onProgress(SRD_FILES.length, SRD_FILES.length, 'listo');
            }
        };

        // ── Barra de progreso del loader ─────────────────────────────
        // Duración animada: 2.5s fija. Si la carga real termina antes,
        // la barra espera en 95%. Si tarda más, se queda en 95% hasta
        // que todo esté listo. Luego salta a 100% y cierra el loader.
        const LOADER_ANIM_MS = 2500;

        function runLoaderProgress(realWorkPromise) {
            const bar  = document.getElementById('loader-bar');
            const msg  = document.getElementById('loader-msg');
            if (!bar || !msg) return realWorkPromise;

            const messages = [
                'Preparando el compendio...',
                'Cargando clases y razas...',
                'Importando equipo y hechizos...',
                'Casi listo...',
            ];
            let msgIdx = 0;
            const msgInterval = setInterval(() => {
                msgIdx = Math.min(msgIdx + 1, messages.length - 1);
                msg.textContent = messages[msgIdx];
            }, LOADER_ANIM_MS / messages.length);

            // Barra animada que llega a 95% en LOADER_ANIM_MS
            const startTime = Date.now();
            const animFrame = () => {
                const elapsed = Date.now() - startTime;
                const pct = Math.min(95, (elapsed / LOADER_ANIM_MS) * 95);
                bar.style.width = pct + '%';
                if (pct < 95) requestAnimationFrame(animFrame);
            };
            requestAnimationFrame(animFrame);

            // Cuando el trabajo real termina, completar la barra
            return realWorkPromise.then(() => {
                clearInterval(msgInterval);
                msg.textContent = '¡Listo para la aventura!';
                // Esperar a que la barra animada llegue al menos al 95%
                const remaining = LOADER_ANIM_MS - (Date.now() - startTime);
                return new Promise(resolve => setTimeout(() => {
                    bar.style.transition = 'width 0.3s ease-out';
                    bar.style.width = '100%';
                    setTimeout(resolve, 350);
                }, Math.max(0, remaining)));
            });
        }

        const resizeImage = (file, maxWidth, maxHeight, quality = 0.7) => {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width, height = img.height;
                        if (width > height) { if (width > maxWidth) { height *= maxWidth / width; width = maxWidth; } } else { if (height > maxHeight) { width *= maxHeight / height; height = maxHeight; } }
                        canvas.width = width; canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', quality));
                    };
                    img.onerror = error => reject(error);
                };
                reader.onerror = error => reject(error);
            });
        };

                    <div className="bg-white rounded-lg w-full max-w-sm p-5 shadow-2xl">
                        <div className="flex justify-between items-center mb-4 border-b pb-2">
                            <h3 className="font-serif font-bold text-xl text-red-900">Nuevo Ataque</h3>
                            {!isLibraryMode && <button onClick={openLibrary} className="text-xs bg-red-100 text-red-800 px-2 py-1 rounded font-bold border border-red-200 hover:bg-red-200">Biblioteca</button>}
                        </div>
                        <div className="space-y-3">
                            <input className="w-full border p-2 rounded" placeholder="Nombre (ej: Espada Larga)" value={form.name} onChange={e => setForm({...form, name: e.target.value})} autoFocus />
                            <input className="w-full border p-2 rounded" placeholder="Tipo (ej: Melee, Rango)" value={form.type} onChange={e => setForm({...form, type: e.target.value})} />
                            <div className="flex gap-2">
                                <input className="w-1/2 border p-2 rounded" placeholder="Bono (ej: +5)" value={form.bonus} onChange={e => setForm({...form, bonus: e.target.value})} />
                                <input className="w-1/2 border p-2 rounded" placeholder="Daño (ej: 1d8+3)" value={form.damage} onChange={e => setForm({...form, damage: e.target.value})} />
                            </div>
                            <textarea className="w-full border p-2 rounded h-20 resize-none text-sm custom-scrollbar" placeholder="Propiedades, notas o efectos extra..." value={form.description} onChange={e => setForm({...form, description: e.target.value})} />
                            <div className="flex gap-2 pt-2">
                                <button onClick={onCancel} className="flex-1 py-2 border rounded text-stone-500">Cancelar</button>
                                <button onClick={() => { if(form.name) onSave(form); }} className="flex-1 py-2 bg-red-700 text-white rounded font-bold">Agregar</button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const LibraryPickerModal = ({ type, library, onSelect, onClose }) => {
            const [search, setSearch] = useState("");
            const items = type === 'spell' ? library.spells : library.attacks;
            const filtered = items.filter(i => i.name.toLowerCase().includes(search.toLowerCase()));

            return (
                <div className="absolute inset-0 bg-black/90 z-[80] flex items-center justify-center p-4 modal-backdrop">
                    <div className="bg-white rounded-lg w-full max-w-sm h-[80vh] flex flex-col">
                        <div className="p-4 border-b flex flex-col gap-2">
                            <div className="flex justify-between items-center">
                                <h3 className="font-serif font-bold text-lg">Biblioteca: {type === 'spell' ? 'Hechizos' : 'Ataques'}</h3>
                                <button onClick={onClose}><Icons.X size={20}/></button>
                            </div>
                            <input 
                                className="w-full border rounded p-2 text-sm bg-stone-50" 
                                placeholder="Buscar..." 
                                value={search} 
                                onChange={e => setSearch(e.target.value)} 
                                autoFocus
                            />
                        </div>
                        <div className="flex-1 overflow-y-auto p-2 space-y-2 bg-stone-50 custom-scrollbar">
                            {filtered.length === 0 && <p className="text-center text-stone-400 text-sm mt-10">No se encontraron resultados.</p>}
                            {filtered.map((item, idx) => (
                                <div key={idx} onClick={() => onSelect(item)} className="bg-white p-3 rounded border border-stone-200 shadow-sm cursor-pointer hover:border-indigo-400 active:bg-indigo-50">
                                    <div className="flex justify-between items-center">
                                        <span className="font-bold text-stone-800">{item.name}</span>
                                        {item.isDuplicate && <span className="text-xs text-blue-500" title="Duplicado importado">ℹ️</span>}
                                    </div>
                                    <div className="text-xs text-stone-500 truncate">
                                        {type === 'spell' ? (item.isCantrip ? 'Truco' : `Nivel ${item.level}`) : item.type}
                                    </div>
                                    <p className="text-[10px] text-stone-500 line-clamp-2 mt-1">{item.description || item.desc}</p>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        const DuplicateInfoModal = ({ onClose }) => (
            <div className="absolute inset-0 bg-black/80 z-[90] flex items-center justify-center p-4 modal-backdrop" onClick={onClose}>
                <div className="bg-white rounded-lg w-full max-w-xs p-6 text-center shadow-2xl" onClick={e => e.stopPropagation()}>
                    <div className="text-4xl mb-2">ℹ️</div>
                    <h3 className="font-bold text-lg text-indigo-900 mb-2">Elemento Duplicado</h3>
                    <p className="text-sm text-stone-600 mb-4">
                        Este elemento fue importado y tiene el mismo nombre que uno existente. 
                        Se conserva como copia para evitar sobrescribir tus datos originales.
                    </p>
                    <button onClick={onClose} className="w-full py-2 bg-indigo-600 text-white rounded font-bold">Entendido</button>
                </div>
            </div>
        );

        // ============================================================
        // LANZADOR DE DADOS — Three.js 3D (renderer único compartido)
        // ============================================================

        // ── DICE SPEED ──────────────────────────────────────────────
        // Controla la velocidad de giro al tirar un dado.
        // 1  = velocidad idle (muy lento, casi flotando)
        // 100 = velocidad máxima (vértigo total)
        // Valor recomendado: entre 8 y 20
        const DICE_SPEED = 12;
        // ────────────────────────────────────────────────────────────
        const DICE_TYPES = [
            { sides: 4,   label: 'd4',   color: 0x991b1b, emissive: 0x3b0a0a },
            { sides: 6,   label: 'd6',   color: 0x1e3a8a, emissive: 0x0a1628 },
            { sides: 8,   label: 'd8',   color: 0x4c1d95, emissive: 0x1a0a3b },
            { sides: 10,  label: 'd10',  color: 0x164e63, emissive: 0x062030 },
            { sides: 12,  label: 'd12',  color: 0x064e3b, emissive: 0x021a14 },
            { sides: 20,  label: 'd20',  color: 0x78350f, emissive: 0x2d1204 },
            { sides: 100, label: 'd100', color: 0x831843, emissive: 0x2d0918 },
        ];

        function buildDiceGeometry(sides) {
            const THREE = window.THREE;
            switch(sides) {
                case 4:   return new THREE.TetrahedronGeometry(1.1);
                case 6:   return new THREE.BoxGeometry(1.6, 1.6, 1.6);
                case 8:   return new THREE.OctahedronGeometry(1.2);
                // d10: bipirámide pentagonal — dos pirámides unidas por la base
                case 10: {
                    const verts = [];
                    for (let i = 0; i < 5; i++) {
                        const a = (i / 5) * Math.PI * 2;
                        verts.push(Math.cos(a) * 1.0, 0, Math.sin(a) * 1.0);
                    }
                    verts.push(0, 1.6, 0);   // polo norte (índice 5)
                    verts.push(0, -1.6, 0);  // polo sur  (índice 6)
                    const idx = [];
                    for (let i = 0; i < 5; i++) {
                        const n = (i + 1) % 5;
                        idx.push(5, i, n);       // cara norte
                        idx.push(6, n, i);       // cara sur
                    }
                    const geo = new THREE.BufferGeometry();
                    geo.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3));
                    geo.setIndex(idx);
                    geo.computeVertexNormals();
                    return geo;
                }
                case 12:  return new THREE.DodecahedronGeometry(1.1);
                case 20:  return new THREE.IcosahedronGeometry(1.2);
                case 100: return new THREE.SphereGeometry(1.1, 18, 18);
                default:  return new THREE.IcosahedronGeometry(1.2);
            }
        }

        // ── Renderer único compartido para el grid de iconos ──────────
        // En lugar de 7 renderers simultáneos, usamos un solo offscreen
        // renderer que dibuja cada dado en su propio canvas 2D vía
        // transferToImageBitmap / toDataURL cada frame de idle.
        // Para la animación central usamos un renderer dedicado pero
        // lo creamos/destruimos limpiamente.

        // SVG estático por dado — se usa en el grid (sin WebGL, sin romperse)
        function DiceIconSVG({ dice, size = 56, active = false }) {
            const THREE = window.THREE;
            // Usamos un canvas 2D simple con paths que imitan la forma del dado
            const shapes = {
                4:   <polygon points="28,4 52,50 4,50" fill="none" stroke="#fbbf24" strokeWidth="1.5" strokeLinejoin="round"/>,
                6:   <rect x="6" y="6" width="44" height="44" rx="7" fill="none" stroke="#fbbf24" strokeWidth="1.5"/>,
                8:   <polygon points="28,4 52,28 28,52 4,28" fill="none" stroke="#fbbf24" strokeWidth="1.5" strokeLinejoin="round"/>,
                10:  <polygon points="28,4 48,22 48,38 28,52 8,38 8,22" fill="none" stroke="#fbbf24" strokeWidth="1.5" strokeLinejoin="round"/>,
                12:  <polygon points="28,3 46,12 54,30 46,48 28,57 10,48 2,30 10,12" fill="none" stroke="#fbbf24" strokeWidth="1.5" strokeLinejoin="round"/>,
                20:  <><polygon points="28,4 52,28 28,52 4,28" fill="none" stroke="#fbbf24" strokeWidth="1.5" strokeLinejoin="round"/><line x1="28" y1="4" x2="28" y2="52" stroke="#fbbf24" strokeWidth="0.7" strokeOpacity="0.5"/><line x1="4" y1="28" x2="52" y2="28" stroke="#fbbf24" strokeWidth="0.7" strokeOpacity="0.5"/></>,
                100: <circle cx="28" cy="28" r="24" fill="none" stroke="#fbbf24" strokeWidth="1.5"/>,
            };
            // Colores de fondo por dado
            const bgColors = { 4:'#3b0a0a', 6:'#0a1628', 8:'#1a0a3b', 10:'#062030', 12:'#021a14', 20:'#2d1204', 100:'#2d0918' };
            return (
                <svg viewBox="0 0 56 56" width={size} height={size}>
                    <rect x="0" y="0" width="56" height="56" rx="8"
                        fill={bgColors[dice.sides] || '#1c1917'}
                        stroke={active ? '#d97706' : 'transparent'}
                        strokeWidth="2"
                    />
                    {/* Cara iluminada simulada */}
                    <ellipse cx="22" cy="18" rx="10" ry="6" fill="white" fillOpacity="0.06" transform={`rotate(-20,22,18)`}/>
                    {shapes[dice.sides]}
                    <text x="28" y="36" textAnchor="middle" fill="#d6d3d1" fontSize="11"
                        fontWeight="bold" fontFamily="Cinzel,serif" fillOpacity="0.9">
                        {dice.label}
                    </text>
                </svg>
            );
        }

        // Canvas 3D solo para la animación central — un renderer, creado al montar
        const DiceRollCanvas = ({ dice, rolling, size = 150 }) => {
            const mountRef = useRef(null);
            const stateRef = useRef(null);

            useEffect(() => {
                const THREE = window.THREE;
                if (!THREE || !mountRef.current || !dice) return;

                // Destruir renderer anterior limpiamente
                if (stateRef.current) {
                    stateRef.current.done = true;
                    cancelAnimationFrame(stateRef.current.animId);
                    stateRef.current.renderer.dispose();
                    stateRef.current.geo.dispose();
                    stateRef.current.mat.dispose();
                }

                const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, powerPreference: 'low-power' });
                renderer.setSize(size, size);
                renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                renderer.setClearColor(0x000000, 0);
                mountRef.current.innerHTML = '';
                mountRef.current.appendChild(renderer.domElement);

                const scene = new THREE.Scene();
                const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 100);
                camera.position.z = 4.5;

                scene.add(new THREE.AmbientLight(0xffffff, 0.45));
                const key = new THREE.DirectionalLight(0xffd700, 1.4);
                key.position.set(3, 5, 4); scene.add(key);
                const fill = new THREE.DirectionalLight(0x7799ff, 0.3);
                fill.position.set(-3, -2, -1); scene.add(fill);
                const rim = new THREE.DirectionalLight(0xffffff, 0.5);
                rim.position.set(0, -4, 2); scene.add(rim);

                const geo = buildDiceGeometry(dice.sides);
                const mat = new THREE.MeshStandardMaterial({
                    color: dice.color, emissive: dice.emissive,
                    metalness: 0.7, roughness: 0.25,
                });
                const mesh = new THREE.Mesh(geo, mat);
                scene.add(mesh);
                const edgeMat = new THREE.LineBasicMaterial({ color: 0xffd700, transparent: true, opacity: 0.35 });
                mesh.add(new THREE.LineSegments(new THREE.EdgesGeometry(geo), edgeMat));

                let t = 0;
                const state = { renderer, geo, mat, done: false, animId: null };
                stateRef.current = state;

                const animate = () => {
                    if (state.done) return;
                    state.animId = requestAnimationFrame(animate);
                    t += 0.016;

                    if (rolling) {
                        // Velocidad controlada por DICE_SPEED (1-100)
                        const base = 0.003 + (DICE_SPEED - 1) * 0.0008;
                        const decay = Math.exp(-t * (0.3 + DICE_SPEED * 0.004));
                        const speed = base + decay * base * 8;
                        mesh.rotation.x += speed * 3.5 + Math.sin(t * 1.5) * 0.008;
                        mesh.rotation.y += speed * 4.5 + Math.cos(t * 1.2) * 0.008;
                        mesh.rotation.z += speed * 1.5;
                        // Bounce suave
                        mesh.position.y = Math.max(0, Math.sin(t * 2.5) * Math.exp(-t * 0.7)) * 0.3;
                    } else {
                        // Idle muy suave
                        mesh.rotation.x += 0.003;
                        mesh.rotation.y += 0.005;
                        mesh.position.y = Math.sin(t * 0.8) * 0.04;
                    }
                    renderer.render(scene, camera);
                };
                animate();

                return () => {
                    state.done = true;
                    cancelAnimationFrame(state.animId);
                    renderer.dispose();
                    geo.dispose();
                    mat.dispose();
                };
            }, [dice?.sides, rolling]);

            return <div ref={mountRef} style={{ width: size, height: size, display:'inline-block' }} />;
        };

        const DiceRoller = ({ registerBackHandler }) => {
            const [panelOpen, setPanelOpen] = useState(false);
            const [rolling, setRolling] = useState(false);
            const [currentRoll, setCurrentRoll] = useState(null);
            const [activeDice, setActiveDice] = useState(null);
            const [history, setHistory] = useState([]);
            const [fabOpacity, setFabOpacity] = useState(0.45);
            const [fabPos, setFabPos] = useState({ side: 'right', y: 72 });
            const [multiCount, setMultiCount] = useState(1);

            const fadeTimerRef = useRef(null);
            const dragRef = useRef({ dragging: false, startY: 0, startPercent: 0 });

            const resetFadeTimer = () => {
                if (fadeTimerRef.current) clearTimeout(fadeTimerRef.current);
                setFabOpacity(1);
                if (!panelOpen) {
                    fadeTimerRef.current = setTimeout(() => setFabOpacity(0.45), 60000);
                }
            };

            useEffect(() => {
                if (!panelOpen) {
                    fadeTimerRef.current = setTimeout(() => setFabOpacity(0.45), 60000);
                } else {
                    if (fadeTimerRef.current) clearTimeout(fadeTimerRef.current);
                    setFabOpacity(1);
                }
                return () => { if (fadeTimerRef.current) clearTimeout(fadeTimerRef.current); };
            }, [panelOpen]);

            useEffect(() => {
                if (registerBackHandler) {
                    registerBackHandler(() => {
                        if (panelOpen) { setPanelOpen(false); return true; }
                        return false;
                    });
                }
            }, [panelOpen]);

            const rollDice = (dice) => {
                if (rolling) return;
                setActiveDice(dice);
                setRolling(true);
                setCurrentRoll(null);
                setTimeout(() => {
                    const count = Math.max(1, Math.min(multiCount, 20));
                    const results = Array.from({ length: count }, () => Math.floor(Math.random() * dice.sides) + 1);
                    const total = results.reduce((a, b) => a + b, 0);
                    const roll = { dice, count, results, total, id: Date.now() };
                    setCurrentRoll(roll);
                    setRolling(false);
                    setHistory(prev => [roll, ...prev].slice(0, 10));
                }, 2200);
            };

            const onFabTouchStart = (e) => {
                if (panelOpen) return;
                const touch = e.touches[0];
                dragRef.current = { dragging: true, startY: touch.clientY, startPercent: fabPos.y };
                resetFadeTimer();
            };
            const onFabTouchMove = (e) => {
                if (!dragRef.current.dragging) return;
                e.preventDefault();
                const touch = e.touches[0];
                const deltaPercent = ((touch.clientY - dragRef.current.startY) / window.innerHeight) * 100;
                const newY = Math.max(8, Math.min(88, dragRef.current.startPercent + deltaPercent));
                const side = touch.clientX < window.innerWidth / 2 ? 'left' : 'right';
                setFabPos({ side, y: newY });
            };
            const onFabTouchEnd = () => { dragRef.current.dragging = false; };

            const isCritical = currentRoll && currentRoll.count === 1 && currentRoll.results[0] === currentRoll.dice.sides;
            const isPifia    = currentRoll && currentRoll.count === 1 && currentRoll.results[0] === 1;

            return (
                <>
                    {/* FAB */}
                    <div
                        style={{ position:'fixed', top:`${fabPos.y}%`, [fabPos.side]:'12px', zIndex:200, opacity:fabOpacity, transition:'opacity 1.5s ease', touchAction:'none' }}
                        onTouchStart={onFabTouchStart}
                        onTouchMove={onFabTouchMove}
                        onTouchEnd={onFabTouchEnd}
                        onClick={() => { resetFadeTimer(); setPanelOpen(p => !p); }}
                    >
                        <div style={{ width:56, height:56, borderRadius:'50%', background:'#1c1917', border:'2px solid #d97706', display:'flex', alignItems:'center', justifyContent:'center', boxShadow:'0 4px 20px rgba(0,0,0,0.7)' }}>
                            <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="#d97706" strokeWidth="1.8" strokeLinejoin="round">
                                <path d="M12 3L2 8.5V16L12 21.5L22 16V8.5L12 3Z"/>
                                <path d="M12 3L12 21.5M2 8.5L22 8.5" strokeOpacity="0.4"/>
                                <path d="M7 8.5L12 3L17 8.5" strokeOpacity="0.4"/>
                            </svg>
                        </div>
                    </div>

                    {/* Panel */}
                    {panelOpen && (
                        <div style={{ position:'fixed', inset:0, zIndex:150 }} onClick={() => setPanelOpen(false)}>
                            <div
                                className="dice-panel"
                                style={{ position:'absolute', bottom:0, left:0, right:0, background:'#1c1917', borderTop:'2px solid #92400e', borderRadius:'20px 20px 0 0', maxHeight:'88vh', overflowY:'auto' }}
                                onClick={e => e.stopPropagation()}
                            >
                                <div style={{ display:'flex', justifyContent:'center', padding:'12px 0 4px' }}>
                                    <div style={{ width:40, height:4, borderRadius:2, background:'#44403c' }}/>
                                </div>

                                <div style={{ padding:'0 16px 24px' }}>
                                    {/* Header */}
                                    <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:16 }}>
                                        <h3 style={{ fontFamily:'Cinzel,serif', color:'#f59e0b', fontSize:20, fontWeight:'bold', margin:0 }}>Lanzar Dados</h3>
                                        <div style={{ display:'flex', alignItems:'center', gap:8, background:'#292524', borderRadius:8, padding:'4px 12px', border:'1px solid #44403c' }}>
                                            <button onClick={() => setMultiCount(c => Math.max(1,c-1))} style={{ color:'#d6d3d1', fontWeight:'bold', fontSize:18, background:'none', border:'none', cursor:'pointer', width:24 }}>−</button>
                                            <span style={{ color:'white', fontWeight:'bold', minWidth:16, textAlign:'center' }}>{multiCount}</span>
                                            <button onClick={() => setMultiCount(c => Math.min(20,c+1))} style={{ color:'#d6d3d1', fontWeight:'bold', fontSize:18, background:'none', border:'none', cursor:'pointer', width:24 }}>+</button>
                                            <span style={{ color:'#78716c', fontSize:11, marginLeft:4 }}>dados</span>
                                        </div>
                                    </div>

                                    {/* Área central — 3D solo cuando hay dado activo */}
                                    {activeDice && (
                                        <div style={{ display:'flex', flexDirection:'column', alignItems:'center', marginBottom:16, padding:'12px', background:'#292524', borderRadius:16, border:'1px solid #44403c', minHeight:180 }}>
                                            <DiceRollCanvas dice={activeDice} rolling={rolling} size={150} />
                                            {!rolling && currentRoll && (
                                                <div style={{ textAlign:'center', marginTop:10 }}>
                                                    <div style={{ fontFamily:'Cinzel,serif', fontSize:52, fontWeight:'bold', lineHeight:1,
                                                        color: isCritical ? '#fbbf24' : isPifia ? '#ef4444' : '#e7e5e4' }}>
                                                        {currentRoll.total}
                                                    </div>
                                                    {currentRoll.count > 1 && (
                                                        <div style={{ color:'#78716c', fontSize:12, marginTop:4 }}>
                                                            [{currentRoll.results.join(' + ')}]
                                                        </div>
                                                    )}
                                                    <div style={{ fontSize:13, marginTop:6 }}>
                                                        <span style={{ color:'#78716c' }}>{currentRoll.count > 1 ? `${currentRoll.count}${currentRoll.dice.label}` : currentRoll.dice.label}</span>
                                                        {isCritical && <span style={{ color:'#fbbf24', marginLeft:8 }}>✨ ¡Crítico!</span>}
                                                        {isPifia    && <span style={{ color:'#ef4444', marginLeft:8 }}>💀 Pifia</span>}
                                                    </div>
                                                </div>
                                            )}
                                            {rolling && <div style={{ color:'#78716c', fontSize:13, marginTop:8 }}>Lanzando...</div>}
                                        </div>
                                    )}

                                    {/* Grid de dados — SVG puro, sin WebGL, sin romperse */}
                                    <div style={{ display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:10, marginBottom:16 }}>
                                        {DICE_TYPES.map(dice => (
                                            <button
                                                key={dice.sides}
                                                onClick={() => rollDice(dice)}
                                                disabled={rolling}
                                                style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:4, padding:'6px 4px', borderRadius:12, background:'transparent', border:'none', cursor:'pointer', opacity: rolling ? 0.5 : 1, transition:'opacity 0.15s' }}
                                            >
                                                <DiceIconSVG dice={dice} size={56} active={activeDice?.sides === dice.sides} />
                                            </button>
                                        ))}
                                    </div>

                                    {/* Historial */}
                                    {history.length > 0 && (
                                        <div>
                                            <div style={{ fontSize:11, fontWeight:'bold', color:'#57534e', textTransform:'uppercase', letterSpacing:'0.1em', marginBottom:8 }}>Historial de sesión</div>
                                            <div style={{ display:'flex', flexDirection:'column', gap:4 }}>
                                                {history.map((h, i) => (
                                                    <div key={h.id} style={{ display:'flex', justifyContent:'space-between', alignItems:'center', padding:'6px 12px', borderRadius:8, background: i===0 ? '#292524' : 'rgba(41,37,36,0.5)', border: i===0 ? '1px solid #44403c' : '1px solid transparent' }}>
                                                        <span style={{ color:'#78716c', fontSize:13 }}>{h.count > 1 ? `${h.count}${h.dice.label}` : h.dice.label}</span>
                                                        <span style={{ fontFamily:'Cinzel,serif', fontWeight:'bold', fontSize: i===0 ? 20 : 15, color: i===0 ? '#f59e0b' : '#d6d3d1' }}>{h.total}</span>
                                                        {h.count > 1 && <span style={{ color:'#57534e', fontSize:11 }}>[{h.results.join(',')}]</span>}
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}
                </>
            );
        };
        // ============================================================

        const LibraryTutorialModal = ({ onClose }) => {
            const [step, setStep] = useState(0);
            const steps = [
                {
                    title: "Bienvenido a la Biblioteca",
                    icon: <Icons.Library size={48} />,
                    text: "Un almacén global para tus Hechizos y Ataques. Crea tus elementos aquí una sola vez y úsalos en todos tus personajes sin tener que volver a escribirlos."
                },
                {
                    title: "Comparte con tu Grupo",
                    icon: <Icons.Upload size={48} />,
                    text: "Usa los botones de Importar y Exportar para compartir tu compendio con tus amigos por WhatsApp o guardar copias de seguridad."
                },
                {
                    title: "Úsala en tus Héroes",
                    icon: <Icons.Plus size={48} />,
                    text: "Al crear un nuevo Ataque o Hechizo en tu hoja de personaje, busca el botón 'Biblioteca' para añadir elementos rápidamente desde aquí."
                }
            ];

            const handleNext = () => {
                if (step < steps.length - 1) setStep(step + 1);
                else handleClose();
            };

            const handleClose = () => {
                DB.setSetting('forja_library_tutorial_seen', true);
                onClose();
            };

            return (
                <div className="absolute inset-0 bg-black/90 z-[100] flex items-center justify-center p-6 modal-backdrop">
                    <div className="bg-white rounded-xl w-full max-w-sm p-6 flex flex-col items-center text-center shadow-2xl">
                        <div className="text-indigo-600 mb-4">{steps[step].icon}</div>
                        <h3 className="font-serif font-bold text-xl text-stone-800 mb-2">{steps[step].title}</h3>
                        <p className="text-sm text-stone-600 mb-6 leading-relaxed">{steps[step].text}</p>
                        
                        <div className="flex gap-1 mb-6">
                            {steps.map((_, i) => (
                                <div key={i} className={`h-2 rounded-full transition-all ${i === step ? 'w-8 bg-indigo-600' : 'w-2 bg-stone-200'}`} />
                            ))}
                        </div>

                        <button onClick={handleNext} className="w-full py-3 bg-stone-800 text-white rounded-lg font-bold shadow-lg hover:bg-stone-700 transition-transform active:scale-95">
                            {step === steps.length - 1 ? "¡A la aventura!" : "Siguiente"}
                        </button>
                        <button onClick={handleClose} className="mt-3 text-xs text-stone-400 font-bold uppercase hover:text-stone-600">Saltar Tutorial</button>
                    </div>
                </div>
            );
        };


        // ============================================================
        // FeaturesTab — Tab "Rasgos"
        // Lectura de char.features con carga dinámica de descripciones
        // desde IndexedDB (srd_traits + srd_feats + homebrew).
        // ============================================================
        const FeaturesTab = ({ char }) => {
            const [expanded, setExpanded] = useState({});
            const [descriptions, setDescriptions] = useState({});
            const [loading, setLoading] = useState(true);

            const features = char.features || [];

            useEffect(() => {
                let cancelled = false;
                (async () => {
                    try {
                        const [traits, feats] = await Promise.all([
                            DB.getSRD('srd_traits').catch(() => []),
                            DB.getSRD('srd_feats').catch(() => []),
                        ]);
                        let brewFeats = [];
                        try { brewFeats = (await DB.getSetting('lm_brew_b_srd_feats')) || []; } catch(e) {}
                        let brewTraits = [];
                        try { brewTraits = (await DB.getSetting('lm_brew_b_srd_traits')) || []; } catch(e) {}

                        if (cancelled) return;

                        const descs = {};
                        [...(traits||[]), ...(brewTraits||[])].forEach(t => {
                            const desc = Array.isArray(t.description) ? t.description.join('\n\n')
                                      : Array.isArray(t.desc) ? t.desc.join('\n\n')
                                      : (t.description || t.desc || '');
                            if (t.index)  descs['trait:' + t.index]  = desc;
                            if (t.name)   descs['trait_name:' + t.name.toLowerCase()] = desc;
                        });
                        [...(feats||[]), ...(brewFeats||[])].forEach(f => {
                            const desc = Array.isArray(f.description) ? f.description.join('\n\n')
                                      : Array.isArray(f.desc) ? f.desc.join('\n\n')
                                      : (f.description || f.desc || '');
                            if (f.index)  descs['feat:' + f.index]  = desc;
                            if (f.name)   descs['feat_name:' + f.name.toLowerCase()] = desc;
                        });

                        setDescriptions(descs);
                    } catch (err) {
                        console.error('[FeaturesTab] Error cargando SRD', err);
                    }
                    setLoading(false);
                })();
                return () => { cancelled = true; };
            }, []);

            function getDescription(feat) {
                if (feat.description) {
                    return Array.isArray(feat.description) ? feat.description.join('\n\n') : feat.description;
                }
                if (feat.type === 'feat' && feat.index) {
                    const d = descriptions['feat:' + feat.index];
                    if (d) return d;
                }
                if ((feat.type === 'species' || feat.type === 'subspecies') && feat.index) {
                    const d = descriptions['trait:' + feat.index];
                    if (d) return d;
                }
                const nameLower = (feat.name || '').toLowerCase();
                if (feat.type === 'feat') {
                    const d = descriptions['feat_name:' + nameLower];
                    if (d) return d;
                }
                const d = descriptions['trait_name:' + nameLower];
                if (d) return d;
                return null;
            }

            const groups = {
                species:    { label: '🧬 Rasgos de Especie',    items: [] },
                subspecies: { label: '🌙 Rasgos de Subespecie', items: [] },
                subclass:   { label: '⚔️ Rasgos de Clase',       items: [] },
                feat:       { label: '★ Dotes',                 items: [] },
            };
            features.forEach(f => {
                const g = groups[f.type] || (groups[f.type] = { label: f.type, items: [] });
                g.items.push(f);
            });

            if (features.length === 0) {
                return (
                    <div className="p-4 space-y-4">
                        <div className="cs-features-empty" style={{textAlign:'center',padding:'40px 20px',opacity:.7}}>
                            <div style={{ fontSize: 48, marginBottom: 12 }}>📜</div>
                            <p>Este personaje todavía no tiene rasgos.</p>
                            <p style={{ fontSize: 12, opacity: .65, marginTop: 6 }}>
                                Los rasgos se generan automáticamente al crear un personaje
                                con el Asistente. Próximamente podrás agregarlos manualmente.
                            </p>
                        </div>
                    </div>
                );
            }

            return (
                <div className="p-4 space-y-4">
                    {Object.entries(groups).map(([typeKey, group]) => {
                        if (group.items.length === 0) return null;
                        return (
                            <div key={typeKey} className="cs-features-group" style={{background:'var(--card-bg)',border:'1px solid var(--card-border)',borderRadius:12,padding:14}}>
                                <h3 className="font-serif font-bold mb-3" style={{color:'var(--text-primary)',fontSize:16,letterSpacing:.3}}>{group.label}</h3>
                                <div className="flex flex-col gap-2">
                                    {group.items.map((feat, idx) => {
                                        const key = `${typeKey}_${idx}`;
                                        const isExpanded = !!expanded[key];
                                        const desc = getDescription(feat);
                                        return (
                                            <div
                                                key={key}
                                                className="cs-feature-item"
                                                style={{
                                                    background:'var(--sheet-bg2)',
                                                    border:'1px solid var(--card-border)',
                                                    borderRadius:9,
                                                    overflow:'hidden',
                                                    transition:'all .15s',
                                                }}
                                            >
                                                <div
                                                    onClick={() => setExpanded(e => ({...e, [key]: !e[key]}))}
                                                    style={{
                                                        padding:'11px 13px',
                                                        cursor:'pointer',
                                                        display:'flex',
                                                        justifyContent:'space-between',
                                                        alignItems:'center',
                                                        gap:10,
                                                    }}
                                                >
                                                    <div style={{fontWeight:700,fontSize:14,color:'var(--text-primary)'}}>{feat.name}</div>
                                                    <div style={{display:'flex',alignItems:'center',gap:8,flexShrink:0}}>
                                                        <span style={{fontSize:11,opacity:.65,color:'var(--text-muted)'}}>{feat.source}</span>
                                                        <span style={{fontSize:10,opacity:.55,color:'var(--text-muted)'}}>{isExpanded ? '▼' : '▶'}</span>
                                                    </div>
                                                </div>
                                                {isExpanded && (
                                                    <div style={{padding:'0 13px 12px',borderTop:'1px solid var(--divider)'}}>
                                                        {desc ? (
                                                            <p style={{fontSize:13,lineHeight:1.6,whiteSpace:'pre-wrap',marginTop:10,color:'var(--text-secondary)'}}>{desc}</p>
                                                        ) : loading ? (
                                                            <p style={{fontSize:12,fontStyle:'italic',marginTop:10,opacity:.6,color:'var(--text-muted)'}}>Cargando descripción...</p>
                                                        ) : (
                                                            <p style={{fontSize:12,fontStyle:'italic',marginTop:10,opacity:.6,color:'var(--text-muted)'}}>No hay descripción disponible para este rasgo.</p>
                                                        )}
                                                    </div>
                                                )}
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        );
                    })}
                </div>
            );
        };


        // ============================================================
        // CSPickerModal — Picker reutilizable para hechizos y equipo
        // 2 flujos: "Elegir de Biblioteca" / "Crear nuevo"
        //
        // Props:
        //   - kind: 'spells' | 'equipment'  (qué tipo de item)
        //   - onSelect(itemForChar): callback con el item ya adaptado al char
        //   - onClose(): cerrar sin elegir
        //
        // Estados internos:
        //   - view: 'choose' | 'browse' | 'create'
        // ============================================================

        // Convierte un hechizo del SRD al formato que la hoja espera
        // (preservando campos extras para vista enriquecida)
        function csConvertSRDSpellToChar(srdSpell) {
            const lvl = typeof srdSpell.level === 'number' ? srdSpell.level : 0;
            return {
                id: 'sp_' + (srdSpell.index || Date.now()) + '_' + Math.random().toString(36).slice(2, 8),
                // Campos legacy que la hoja vieja consume
                name:        srdSpell.name || 'Sin nombre',
                level:       lvl,
                isCantrip:   lvl === 0,
                time:        srdSpell.casting_time || '',
                range:       srdSpell.range || '',
                damage:      srdSpell.damage?.damage_dice
                                ? `${srdSpell.damage.damage_dice}${srdSpell.damage.damage_type?.name ? ' ' + srdSpell.damage.damage_type.name : ''}`
                                : '',
                description: Array.isArray(srdSpell.desc) ? srdSpell.desc.join('\n\n')
                              : Array.isArray(srdSpell.description) ? srdSpell.description.join('\n\n')
                              : (srdSpell.desc || srdSpell.description || ''),
                // Campos extras del SRD (para vista enriquecida en 3b)
                index:         srdSpell.index || '',
                source:        srdSpell.source || 'srd',
                school:        srdSpell.school || null,
                components:    srdSpell.components || [],
                material:      srdSpell.material || '',
                concentration: !!srdSpell.concentration,
                ritual:        !!srdSpell.ritual,
                duration:      srdSpell.duration || '',
                classes:       srdSpell.classes || [],
                higher_level:  Array.isArray(srdSpell.higher_level) ? srdSpell.higher_level.join('\n\n') : (srdSpell.higher_level || ''),
            };
        }

        // Convierte un item de Equipo del SRD al formato char.attacks
        function csConvertSRDEquipmentToChar(srdItem) {
            const damageStr = srdItem.damage?.damage_dice
                ? `${srdItem.damage.damage_dice}${srdItem.damage.damage_type?.name ? ' ' + srdItem.damage.damage_type.name : ''}`
                : '';
            // Tipo legible
            let type = '';
            if (srdItem.equipment_category?.name) type = srdItem.equipment_category.name;
            // Para armas, agregamos info útil
            if (srdItem.weapon_category) type = `Arma · ${srdItem.weapon_category}`;
            if (srdItem.armor_category) type = `Armadura · ${srdItem.armor_category}`;

            return {
                id:    'eq_' + (srdItem.index || Date.now()) + '_' + Math.random().toString(36).slice(2, 8),
                name:  srdItem.name || 'Sin nombre',
                type:  type,
                bonus: '+0',
                damage: damageStr,
                description: Array.isArray(srdItem.desc) ? srdItem.desc.join('\n\n')
                              : Array.isArray(srdItem.description) ? srdItem.description.join('\n\n')
                              : (srdItem.desc || srdItem.description || ''),
                // Campos enriquecidos para el detail modal
                index:               srdItem.index || '',
                source:              srdItem.source || 'srd',
                category:            'equipment',
                equipment_category:  srdItem.equipment_category || null,
                weapon_category:     srdItem.weapon_category || '',
                armor_category:      srdItem.armor_category || '',
                cost:                srdItem.cost || null,
                weight:              srdItem.weight || null,
                properties:          srdItem.properties || [],
                armor_class:         srdItem.armor_class || null,
                damage_data:         srdItem.damage || null,
            };
        }

        // Convierte un Item Mágico del SRD al formato char.attacks
        function csConvertSRDMagicItemToChar(srdItem) {
            const rarity = srdItem.rarity?.name || '';
            const category = srdItem.equipment_category?.name || '';
            let type = category;
            if (rarity) type = `${category} · ${rarity}`;

            return {
                id:    'mi_' + (srdItem.index || Date.now()) + '_' + Math.random().toString(36).slice(2, 8),
                name:  srdItem.name || 'Sin nombre',
                type:  type,
                bonus: '',
                damage: '',
                description: Array.isArray(srdItem.desc) ? srdItem.desc.join('\n\n')
                              : Array.isArray(srdItem.description) ? srdItem.description.join('\n\n')
                              : (srdItem.desc || srdItem.description || ''),
                // Campos enriquecidos
                index:              srdItem.index || '',
                source:             srdItem.source || 'srd',
                category:           'magic_item',
                equipment_category: srdItem.equipment_category || null,
                rarity:             srdItem.rarity || null,
                attunement:         !!srdItem.attunement,
                attunement_note:    srdItem.attunement_note || '',
            };
        }

        // ── Funciones inversas: char → formato SRD (para editar) ──
        // Solo aplica a items homebrew (los del SRD no son editables).
        // Devuelven el objeto con la forma que LMItemForm.parseItem espera.
        function csCharSpellToSRD(charSpell) {
            const lvl = charSpell.isCantrip ? 0
                       : (typeof charSpell.level === 'number' ? charSpell.level : 1);
            return {
                index: charSpell.index || charSpell.id || ('hb_' + Date.now()),
                name:  charSpell.name || '',
                level: lvl,
                school:        charSpell.school || null,
                casting_time:  charSpell.time || charSpell.casting_time || '',
                range:         charSpell.range || '',
                duration:      charSpell.duration || '',
                concentration: !!charSpell.concentration,
                ritual:        !!charSpell.ritual,
                components:    charSpell.components || [],
                material:      charSpell.material || '',
                classes:       charSpell.classes || [],
                // Daño: el char tiene string "8d6 Fuego" pero LMItemForm espera estructura
                damage: charSpell.damage_data || (() => {
                    // Intentar parsear "8d6 Fuego" o "1d8 + 3"
                    if (!charSpell.damage) return null;
                    const m = charSpell.damage.match(/^(\d+d\d+(?:\s*\+\s*\d+)?)\s*(.*)$/i);
                    return m ? { damage_dice: m[1].replace(/\s/g,''), damage_type: m[2] ? { name: m[2].trim() } : null } : null;
                })(),
