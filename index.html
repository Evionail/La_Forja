                desc:         charSpell.description ? charSpell.description.split('\n\n') : [],
                higher_level: charSpell.higher_level ? charSpell.higher_level.split('\n\n') : [],
                source: 'homebrew',
            };
        }

        function csCharItemToSRD(charItem) {
            // El char.attacks puede ser equipo o magic_item — distinguir por category
            const isMagic = charItem.category === 'magic_item';
            return {
                index: charItem.index || charItem.id || ('hb_' + Date.now()),
                name:  charItem.name || '',
                equipment_category: charItem.equipment_category || null,
                rarity:             charItem.rarity || null,
                attunement:         !!charItem.attunement,
                attunement_note:    charItem.attunement_note || '',
                cost:               charItem.cost || null,
                weight:             charItem.weight || null,
                properties:         charItem.properties || [],
                armor_class:        charItem.armor_class || null,
                damage:             charItem.damage_data || null,
                desc:               charItem.description ? [charItem.description] : [],
                source: 'homebrew',
                // Indicador del catId para LMItemForm
                _catKey: isMagic ? 'srd_magic_items' : 'srd_equipment',
            };
        }

        // Decide qué catId usar al editar un item del char
        function csGetCatIdForEdit(item, kind) {
            if (kind === 'spells')        return 'b_srd_spells';
            // Para equipo/items mágicos, distinguir por category
            if (item.category === 'magic_item') return 'b_srd_magic_items';
            return 'b_srd_equipment';
        }

        // ============================================================
        // CSEditModal — Envuelve LMItemForm para editar un item homebrew
        // existente del char. NO actualiza la biblioteca general (decisión
        // de diseño: el item del char es una copia independiente).
        //
        // Props:
        //   - item: el item del char (formato char, no SRD)
        //   - kind: 'spells' | 'equipment' (de qué array viene)
        //   - onSave(updatedCharItem): callback con el item ya re-convertido
        //   - onClose()
        //   - darkMode
        // ============================================================
        const CSEditModal = ({ item, kind, onSave, onClose, darkMode }) => {
            if (!item) return null;

            const isSpells = kind === 'spells';

            // Convertir char-item → SRD-shape para que LMItemForm pueda editarlo
            const srdShape = isSpells ? csCharSpellToSRD(item) : csCharItemToSRD(item);
            const catId = isSpells ? 'b_srd_spells'
                        : (item.category === 'magic_item' ? 'b_srd_magic_items' : 'b_srd_equipment');

            function handleSave(updatedItem) {
                // Re-convertir SRD-shape → char-shape preservando el id original
                let charItem;
                if (isSpells) {
                    charItem = csConvertSRDSpellToChar(updatedItem);
                } else if (catId === 'b_srd_magic_items') {
                    charItem = csConvertSRDMagicItemToChar(updatedItem);
                } else {
                    charItem = csConvertSRDEquipmentToChar(updatedItem);
                }
                // Preservar el id original del char para que React no descuadre
                charItem.id = item.id;
                charItem.source = 'homebrew';
                onSave(charItem);
            }

            return (
                <div className="absolute inset-0 bg-black/90 z-[85] flex items-center justify-center p-4 modal-backdrop" onClick={(e) => { if (e.target === e.currentTarget) onClose(); }}>
                    <div className="rounded-lg w-full max-w-md h-[90vh] flex flex-col shadow-2xl" style={{background:'var(--modal-bg)',color:'var(--text-primary)'}}>
                        <div className="p-3 flex items-center justify-between flex-shrink-0" style={{borderBottom:'1px solid var(--divider)'}}>
                            <div className="text-sm font-bold flex items-center gap-1" style={{color:'var(--text-muted)'}}>
                                <Icons.Edit size={16}/> Editando
                            </div>
                            <h3 className="font-serif font-bold text-base truncate max-w-[60%]" style={{color:'var(--text-primary)'}}>{item.name}</h3>
                            <button onClick={onClose} style={{color:'var(--text-muted)'}}><Icons.X size={20}/></button>
                        </div>
                        <div className={`flex-1 overflow-y-auto custom-scrollbar lm-wrap ${darkMode ? 'lm-dark' : 'lm-light'}`}>
                            {typeof LMItemForm !== 'undefined' && (
                                <LMItemForm
                                    catId={catId}
                                    editItem={srdShape}
                                    onSave={(updated) => handleSave(updated)}
                                    onCancel={onClose}
                                    onToast={() => {}}
                                />
                            )}
                        </div>
                    </div>
                </div>
            );
        };


        // ============================================================
        // CSEquipmentTypeModal — Modal pequeño que pregunta tipo
        // ============================================================
        const CSEquipmentTypeModal = ({ onSelect, onClose }) => {
            return (
                <div className="absolute inset-0 bg-black/90 z-[80] flex items-center justify-center p-4 modal-backdrop" onClick={(e) => { if (e.target === e.currentTarget) onClose(); }}>
                    <div className="rounded-lg w-full max-w-sm p-5 shadow-2xl" style={{background:'var(--modal-bg)',color:'var(--text-primary)'}}>
                        <div className="flex justify-between items-center mb-5">
                            <h3 className="font-serif font-bold text-xl" style={{color:'var(--text-primary)'}}>Agregar Equipo</h3>
                            <button onClick={onClose} style={{color:'var(--text-muted)'}}><Icons.X size={22}/></button>
                        </div>
                        <p className="text-sm mb-5" style={{color:'var(--text-muted)'}}>
                            ¿Qué tipo de equipo quieres agregar?
                        </p>
                        <div className="flex flex-col gap-3">
                            <button
                                onClick={() => onSelect('equipment')}
                                className="rounded-xl p-4 text-left transition-all border-2 hover:scale-[1.02]"
                                style={{background:'var(--red-soft)',borderColor:'var(--card-border)',color:'var(--red-text)'}}
                            >
                                <div className="flex items-center gap-3 mb-2">
                                    <div style={{fontSize:32}}>⚔️</div>
                                    <div className="font-bold text-base">Equipo</div>
                                </div>
                                <div className="text-xs opacity-80 leading-snug">
                                    Armas, armaduras, herramientas y equipo de aventurero.
                                </div>
                            </button>
                            <button
                                onClick={() => onSelect('magic_items')}
                                className="rounded-xl p-4 text-left transition-all border-2 hover:scale-[1.02]"
                                style={{background:'var(--indigo-soft)',borderColor:'var(--card-border)',color:'var(--indigo-text)'}}
                            >
                                <div className="flex items-center gap-3 mb-2">
                                    <div style={{fontSize:32}}>✨</div>
                                    <div className="font-bold text-base">Item Mágico</div>
                                </div>
                                <div className="text-xs opacity-80 leading-snug">
                                    Objetos encantados, pociones, varitas y reliquias.
                                </div>
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const CSPickerModal = ({ kind, onSelect, onClose, onToast, darkMode }) => {
            const [view, setView] = useState('choose');
            const [items, setItems] = useState([]);
            const [loading, setLoading] = useState(false);
            const [search, setSearch] = useState('');
            const [saveToLibrary, setSaveToLibrary] = useState(false);

            const isSpells     = kind === 'spells';
            const isEquipment  = kind === 'equipment';
            const isMagicItems = kind === 'magic_items';
            const title = isSpells ? 'Hechizo'
                        : isMagicItems ? 'Item Mágico'
                        : isEquipment ? 'Equipo'
                        : 'Item';

            // Cargar items del SRD + homebrew al entrar a 'browse'
            useEffect(() => {
                if (view !== 'browse') return;
                let cancelled = false;
                setLoading(true);
                (async () => {
                    try {
                        if (isSpells) {
                            const srd  = (await DB.getSRD('srd_spells')) || [];
                            let brew = [];
                            try { brew = (await DB.getSetting('lm_brew_b_srd_spells')) || []; } catch(e) {}
                            if (!cancelled) {
                                const all = [...srd, ...brew];
                                all.sort((a, b) => (a.name || '').localeCompare(b.name || ''));
                                setItems(all);
                            }
                        } else if (isEquipment) {
                            const srd = (await DB.getSRD('srd_equipment')) || [];
                            let brew = [];
                            try { brew = (await DB.getSetting('lm_brew_b_srd_equipment')) || []; } catch(e) {}
                            if (!cancelled) {
                                const all = [...srd, ...brew];
                                all.sort((a, b) => (a.name || '').localeCompare(b.name || ''));
                                setItems(all);
                            }
                        } else if (isMagicItems) {
                            const srd = (await DB.getSRD('srd_magic_items')) || [];
                            let brew = [];
                            try { brew = (await DB.getSetting('lm_brew_b_srd_magic_items')) || []; } catch(e) {}
                            if (!cancelled) {
                                const all = [...srd, ...brew];
                                all.sort((a, b) => (a.name || '').localeCompare(b.name || ''));
                                setItems(all);
                            }
                        }
                    } catch (err) {
                        console.error('[CSPicker] Error cargando', err);
                    }
                    if (!cancelled) setLoading(false);
                })();
                return () => { cancelled = true; };
            }, [view, kind]);

            // Búsqueda fuzzy con Fuse si hay query
            const filtered = React.useMemo(() => {
                if (!search.trim()) return items;
                if (typeof Fuse === 'undefined') {
                    const q = search.toLowerCase();
                    return items.filter(i => (i.name || '').toLowerCase().includes(q));
                }
                const fuse = new Fuse(items, { keys: ['name'], threshold: 0.3 });
                return fuse.search(search).map(r => r.item);
            }, [items, search]);

            // ── Convertir un item SRD al formato char según el kind ──
            function convertToCharFormat(item) {
                if (isSpells)     return csConvertSRDSpellToChar(item);
                if (isEquipment)  return csConvertSRDEquipmentToChar(item);
                if (isMagicItems) return csConvertSRDMagicItemToChar(item);
                return item;
            }

            // ── Seleccionar item de la biblioteca ──
            function handlePickItem(item) {
                onSelect(convertToCharFormat(item));
            }

            // ── Crear nuevo: handler que recibe item de LMItemForm ──
            async function handleCreateNew(item, catId) {
                // Si el usuario marcó "guardar en biblioteca", guardamos
                if (saveToLibrary && typeof catId === 'string') {
                    try {
                        const key = 'lm_brew_' + catId;
                        const existing = (await DB.getSetting(key)) || [];
                        const withId = { ...item, id: item.index || Date.now().toString() };
                        await DB.setSetting(key, [...existing, withId]);
                        if (onToast) onToast('✅ Guardado en biblioteca');
                    } catch (err) {
                        console.error('[CSPicker] Error guardando en biblioteca', err);
                    }
                }
                // Agregar al char
                onSelect(convertToCharFormat(item));
            }

            // ── Render: pantalla "Choose" (2 cards grandes) ──
            if (view === 'choose') {
                return (
                    <div className="absolute inset-0 bg-black/90 z-[80] flex items-center justify-center p-4 modal-backdrop" onClick={(e) => { if (e.target === e.currentTarget) onClose(); }}>
                        <div className="rounded-lg w-full max-w-sm p-5 shadow-2xl" style={{background:'var(--modal-bg)',color:'var(--text-primary)'}}>
                            <div className="flex justify-between items-center mb-5">
                                <h3 className="font-serif font-bold text-xl" style={{color:'var(--text-primary)'}}>Agregar {title}</h3>
                                <button onClick={onClose} style={{color:'var(--text-muted)'}}><Icons.X size={22}/></button>
                            </div>
                            <p className="text-sm mb-5" style={{color:'var(--text-muted)'}}>
                                ¿Cómo quieres agregar el nuevo {title.toLowerCase()}?
                            </p>
                            <div className="flex flex-col gap-3">
                                <button
                                    onClick={() => setView('browse')}
                                    className="rounded-xl p-4 text-left transition-all border-2 hover:scale-[1.02]"
                                    style={{background:'var(--indigo-soft)',borderColor:'var(--card-border)',color:'var(--indigo-text)'}}
                                >
                                    <div className="flex items-center gap-3 mb-2">
                                        <div style={{fontSize:32}}>📚</div>
                                        <div className="font-bold text-base">Elegir de la Biblioteca</div>
                                    </div>
                                    <div className="text-xs opacity-80 leading-snug">
                                        Busca entre todos los {title.toLowerCase()}s del SRD y los que has creado.
                                    </div>
                                </button>
                                <button
                                    onClick={() => setView('create')}
                                    className="rounded-xl p-4 text-left transition-all border-2 hover:scale-[1.02]"
                                    style={{background:'var(--red-soft)',borderColor:'var(--card-border)',color:'var(--red-text)'}}
                                >
                                    <div className="flex items-center gap-3 mb-2">
                                        <div style={{fontSize:32}}>✨</div>
                                        <div className="font-bold text-base">Crear nuevo</div>
                                    </div>
                                    <div className="text-xs opacity-80 leading-snug">
                                        Diseña un {title.toLowerCase()} desde cero con el formulario completo.
                                    </div>
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            // ── Render: pantalla "Browse" (lista del SRD + homebrew) ──
            if (view === 'browse') {
                return (
                    <div className="absolute inset-0 bg-black/90 z-[80] flex items-center justify-center p-4 modal-backdrop" onClick={(e) => { if (e.target === e.currentTarget) onClose(); }}>
                        <div className="rounded-lg w-full max-w-sm h-[85vh] flex flex-col shadow-2xl" style={{background:'var(--modal-bg)',color:'var(--text-primary)'}}>
                            <div className="p-4 flex flex-col gap-2" style={{borderBottom:'1px solid var(--divider)'}}>
                                <div className="flex justify-between items-center">
                                    <button onClick={() => setView('choose')} className="text-sm font-bold flex items-center gap-1" style={{color:'var(--text-muted)'}}>
                                        <Icons.ArrowLeft size={16}/> Atrás
                                    </button>
                                    <h3 className="font-serif font-bold text-base" style={{color:'var(--text-primary)'}}>Biblioteca: {title}s</h3>
                                    <button onClick={onClose} style={{color:'var(--text-muted)'}}><Icons.X size={20}/></button>
                                </div>
                                <input
                                    className="w-full rounded p-2 text-sm outline-none"
                                    style={{background:'var(--input-bg)',border:'1px solid var(--input-border)',color:'var(--text-primary)'}}
                                    placeholder="Buscar..."
                                    value={search}
                                    onChange={e => setSearch(e.target.value)}
                                    autoFocus
                                />
                                <div className="text-[10px] opacity-65" style={{color:'var(--text-muted)'}}>
                                    {loading ? 'Cargando...' : `${filtered.length} resultado${filtered.length !== 1 ? 's' : ''}`}
                                </div>
                            </div>
                            <div className="flex-1 overflow-y-auto p-2 space-y-2 custom-scrollbar" style={{background:'var(--sheet-bg2)'}}>
                                {loading && (
                                    <div className="text-center py-10 text-sm" style={{color:'var(--text-muted)'}}>
                                        Cargando biblioteca...
                                    </div>
                                )}
                                {!loading && filtered.length === 0 && (
                                    <div className="text-center py-10 text-sm" style={{color:'var(--text-muted)'}}>
                                        No se encontraron resultados.
                                    </div>
                                )}
                                {!loading && filtered.map((item, idx) => {
                                    const isBrew = item.source === 'homebrew';
                                    return (
                                        <div
                                            key={item.index || idx}
                                            onClick={() => handlePickItem(item)}
                                            className="p-3 rounded cursor-pointer transition-all active:scale-[.98]"
                                            style={{background:'var(--card-bg)',border:'1px solid var(--card-border)'}}
                                        >
                                            <div className="flex justify-between items-start gap-2">
                                                <div className="flex-1 min-w-0">
                                                    <div className="font-bold text-sm flex items-center gap-2" style={{color:'var(--text-primary)'}}>
                                                        {item.name}
                                                        {isBrew && <span className="text-[10px] px-1.5 py-0.5 rounded font-bold" style={{background:'#7c3aed',color:'#fff'}}>⚒ HB</span>}
                                                    </div>
                                                    <div className="text-xs mt-1" style={{color:'var(--text-muted)'}}>
                                                        {isSpells && (
                                                            <>
                                                                {item.level === 0 ? 'Truco' : `Nivel ${item.level}`}
                                                                {item.school?.name && ` · ${item.school.name}`}
                                                            </>
                                                        )}
                                                        {isEquipment && (
                                                            <>
                                                                {item.equipment_category?.name || '—'}
                                                                {item.weapon_category && ` · ${item.weapon_category}`}
                                                                {item.armor_category && ` · ${item.armor_category}`}
                                                            </>
                                                        )}
                                                        {isMagicItems && (
                                                            <>
                                                                {item.equipment_category?.name || '—'}
                                                                {item.rarity?.name && ` · ${item.rarity.name}`}
                                                            </>
                                                        )}
                                                    </div>
                                                </div>
                                            </div>
                                            {(item.desc || item.description) && (
                                                <p className="text-[10px] mt-2 line-clamp-2" style={{color:'var(--text-muted)'}}>
                                                    {Array.isArray(item.desc) ? item.desc.join(' ') : (item.desc || (Array.isArray(item.description) ? item.description.join(' ') : item.description))}
                                                </p>
                                            )}
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    </div>
                );
            }

            // ── Render: pantalla "Create" (LMItemForm con checkbox extra) ──
            if (view === 'create') {
                const catId = isSpells ? 'b_srd_spells'
                            : isEquipment ? 'b_srd_equipment'
                            : isMagicItems ? 'b_srd_magic_items'
                            : null; // null = LMItemForm muestra dropdown
                return (
                    <div className="absolute inset-0 bg-black/90 z-[80] flex items-center justify-center p-4 modal-backdrop" onClick={(e) => { if (e.target === e.currentTarget) onClose(); }}>
                        <div className="rounded-lg w-full max-w-md h-[90vh] flex flex-col shadow-2xl" style={{background:'var(--modal-bg)',color:'var(--text-primary)'}}>
                            <div className="p-3 flex items-center justify-between flex-shrink-0" style={{borderBottom:'1px solid var(--divider)'}}>
                                <button onClick={() => setView('choose')} className="text-sm font-bold flex items-center gap-1" style={{color:'var(--text-muted)'}}>
                                    <Icons.ArrowLeft size={16}/> Atrás
                                </button>
                                <h3 className="font-serif font-bold text-base" style={{color:'var(--text-primary)'}}>Crear {title}</h3>
                                <button onClick={onClose} style={{color:'var(--text-muted)'}}><Icons.X size={20}/></button>
                            </div>
                            {/* Checkbox "Guardar en biblioteca" */}
                            <div className="p-3 flex-shrink-0" style={{borderBottom:'1px solid var(--divider)',background:'var(--sheet-bg2)'}}>
                                <label className="flex items-start gap-2 cursor-pointer text-sm">
                                    <input
                                        type="checkbox"
                                        checked={saveToLibrary}
                                        onChange={e => setSaveToLibrary(e.target.checked)}
                                        style={{marginTop:3,width:16,height:16,cursor:'pointer'}}
                                    />
                                    <div style={{flex:1,lineHeight:1.45}}>
                                        <div className="font-bold" style={{color:'var(--text-primary)'}}>Guardar también en mi biblioteca</div>
                                        <div className="text-xs" style={{color:'var(--text-muted)'}}>
                                            Si lo marcas, podrás reutilizarlo en otros personajes.
                                        </div>
                                    </div>
                                </label>
                            </div>
                            {/* Form dinámico de la LM */}
                            <div className={`flex-1 overflow-y-auto custom-scrollbar lm-wrap ${darkMode ? 'lm-dark' : 'lm-light'}`} data-from-cs="true">
                                {typeof LMItemForm !== 'undefined' && (
                                    <LMItemForm
                                        catId={catId}
                                        editItem={null}
                                        onSave={(item, finalCatId) => handleCreateNew(item, finalCatId || catId)}
                                        onCancel={() => setView('choose')}
                                        onToast={(msg) => onToast && onToast(msg)}
                                    />
                                )}
                            </div>
                        </div>
                    </div>
                );
            }

            return null;
        };


        const MobileShell = ({ 
            char, setChar, activeTab, setActiveTab, onClose,
            showRestModal, setShowRestModal, showAvatarModal, setShowAvatarModal, showBgUploadModal, setShowBgUploadModal, showSpellForm, setShowSpellForm, showAttackForm, setShowAttackForm, showBgModal, setShowBgModal, showNoSlotsModal, setShowNoSlotsModal, castModalData, setCastModalData, viewSpell, setViewSpell, viewAttack, setViewAttack,
            showSpellPicker, setShowSpellPicker, pickerToast, setPickerToast,
            showEquipTypeModal, setShowEquipTypeModal, equipPickerKind, setEquipPickerKind,
            editingItem, setEditingItem,
            viewSpellDetail, viewAttackDetail,
            setPreviewImage, setBgPreviewImage, previewImage, bgPreviewImage,
            pb, calculateModifier,
            castSpell, spendSlot, toggleDeathSave, toggleProficiency, updateStat, toggleSaveProficiency, decreaseDice, increaseDice,
            handleImageUpload, saveAvatar, saveBackground, removeBackground, handleShortRest, handleLongRest, selectBackground,
            registerBackHandler, darkMode, toggleDark
        }) => {
            const boxClass = char.boxTransparent
                ? darkMode
                    ? "backdrop-blur-md border shadow-sm" // vidrio oscuro
                    : "bg-white/70 backdrop-blur-md border border-white/50 shadow-sm" // vidrio claro
                : darkMode
                    ? "dm-card border shadow"
                    : "bg-white border border-stone-200 shadow";

            // Estilo inline para el vidrio oscuro (no se puede hacer solo con clases)
            const boxStyle = char.boxTransparent && darkMode
                ? { background: 'rgba(30,28,27,0.65)', borderColor: 'rgba(255,255,255,0.1)' }
                : {};
            const getSaveBonus = (statId) => calculateModifier(char.stats[statId]) + (char.savingThrows.includes(statId) ? pb : 0);
            const getSkillInfo = (skillId) => { const skill = SKILLS_LIST.find(s => s.id === skillId); const attrMod = calculateModifier(char.stats[skill.attr]); const isProficient = char.proficiencies.includes(skillId); const total = attrMod + (isProficient ? pb : 0); let profSource = null; if (isProficient) { const currentBg = BACKGROUNDS_SRD.find(bg => bg.name === char.background); if (currentBg && currentBg.skills.includes(skillId)) profSource = char.background; else profSource = "Competencia"; } const breakdown = `(${attrMod >= 0 ? '+' : ''}${attrMod} ${skill.attr.toUpperCase()}${isProficient ? ` +${pb} ${profSource}` : ''})`; return { total, breakdown }; };

            const [showLibraryPicker, setShowLibraryPicker] = useState(null); // 'spell' | 'attack' | null
            const [library, setLibrary] = useState({ spells: [], attacks: [] });

            useEffect(() => {
                if (showLibraryPicker) {
                    DB.getLibraryMaster().then(data => setLibrary(data));
                }
            }, [showLibraryPicker]);

            const handleLibrarySelect = (item) => {
                const newItem = { ...item, id: Date.now() };
                delete newItem.isDuplicate; 

                if (showLibraryPicker === 'spell') {
                    setChar(p => ({...p, spells: [...p.spells, newItem]}));
                    setShowSpellForm(false);
                } else {
                    setChar(p => ({...p, attacks: [...p.attacks, newItem]}));
                    setShowAttackForm(false);
                }
                setShowLibraryPicker(null);
            };

            const modalsRef = useRef({ showRestModal, showAvatarModal, showBgUploadModal, showSpellForm, showAttackForm, showBgModal, showNoSlotsModal, castModalData, viewSpell, viewAttack, showLibraryPicker, showSpellPicker, showEquipTypeModal, equipPickerKind, editingItem });
            useEffect(() => { modalsRef.current = { ...modalsRef.current, showLibraryPicker, showSpellPicker, showEquipTypeModal, equipPickerKind, editingItem }; });

            useEffect(() => {
                if (pickerToast) {
                    const t = setTimeout(() => setPickerToast(null), 2500);
                    return () => clearTimeout(t);
                }
            }, [pickerToast]);

            useEffect(() => {
                if (registerBackHandler) {
                    registerBackHandler(() => {
                        const m = modalsRef.current;
                        if (m.editingItem) { setEditingItem(null); return true; }
                        if (m.equipPickerKind) { setEquipPickerKind(null); return true; }
                        if (m.showEquipTypeModal) { setShowEquipTypeModal(false); return true; }
                        if (m.showSpellPicker) { setShowSpellPicker(false); return true; }
                        if (m.showLibraryPicker) { setShowLibraryPicker(null); return true; }
                        if (m.showRestModal) { setShowRestModal(false); return true; }
                        if (m.showAvatarModal) { setShowAvatarModal(false); setPreviewImage(null); return true; }
                        if (m.showBgUploadModal) { setShowBgUploadModal(false); setBgPreviewImage(null); return true; }
                        if (m.showSpellForm) { setShowSpellForm(false); return true; }
                        if (m.showAttackForm) { setShowAttackForm(false); return true; }
                        if (m.showBgModal) { setShowBgModal(false); return true; }
                        if (m.showNoSlotsModal) { setShowNoSlotsModal(false); return true; }
                        if (m.castModalData) { setCastModalData(null); return true; }
                        if (m.viewSpell) { setViewSpell(null); return true; }
                        if (m.viewAttack) { setViewAttack(null); return true; }
                        return false; 
                    });
                }
                return () => { if(registerBackHandler) registerBackHandler(null); };
            }, []);

            return (
                <div className="flex flex-col h-full overflow-hidden relative text-stone-900">
                    {!char.backgroundUrl && (
                        <div className="fixed inset-0 pointer-events-none z-0" style={{ background: 'var(--sheet-bg)', height: '100lvh' }} />
                    )}
                    {char.backgroundUrl && (
                        <div className="fixed inset-0 pointer-events-none z-0" style={{ backgroundImage: `url(${char.backgroundUrl})`, backgroundSize: 'cover', backgroundPosition: 'center', height: '100lvh' }}>
                            {(char.bgOpacity > 0) && (
                                <div className="absolute inset-0 transition-opacity duration-300" style={{ background: darkMode ? `rgba(0,0,0,${char.bgOpacity})` : `rgba(255,255,255,${char.bgOpacity})` }} />
                            )}
                        </div>
                    )}
                    
                    {/* Header rediseñado — jerarquía visual mejorada */}
                    <div className="bg-stone-800 p-3 pt-8 shadow-md z-20 flex justify-between items-start border-b border-stone-700 relative">
                        <button onClick={onClose} className="mr-2 text-stone-400 hover:text-white mt-2 flex-shrink-0"><Icons.ArrowLeft size={24}/></button>
                        <div className="flex items-start gap-3 flex-1 min-w-0">
                            <div className="w-14 h-14 rounded-full bg-stone-200 border-2 border-red-700 overflow-hidden flex-shrink-0 cursor-pointer relative group shadow-lg mt-1" onClick={() => { setPreviewImage(char.profileImage); setShowAvatarModal(true); }}>
                                {char.profileImage
                                    ? <img src={char.profileImage} className="w-full h-full object-cover" alt={char.name}/>
                                    : <div className="w-full h-full flex items-center justify-center text-stone-800 font-bold text-2xl">{(char.name && char.name[0]) || '?'}</div>
                                }
                                <div className="absolute inset-0 bg-black/50 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity"><Icons.Camera size={20} className="text-white"/></div>
                            </div>
                            <div className="flex-1 min-w-0">
                                {/* Nombre — protagonista, más grande */}
                                <input
                                    className="font-serif font-bold text-2xl leading-tight bg-transparent border-b border-transparent hover:border-stone-600 focus:border-stone-400 w-full text-white truncate transition-colors mb-1"
                                    value={char.name}
                                    onChange={e => setChar({...char, name: e.target.value})}
                                    placeholder="Nombre del héroe"
                                />
                                {/* Subtítulo principal — Especie · Clase · Nivel */}
                                <div className="flex items-center gap-1.5 text-sm text-stone-400 mb-1 flex-wrap">
                                    <input
                                        className="bg-transparent border-b border-transparent hover:border-stone-700 focus:border-stone-500 max-w-[5rem] truncate font-medium"
                                        placeholder="Raza"
                                        value={char.race}
                                        onChange={e => setChar({...char, race: e.target.value})}
                                    />
                                    <span className="text-stone-600">·</span>
                                    <input
                                        className="bg-transparent border-b border-transparent hover:border-stone-700 focus:border-stone-500 max-w-[5rem] truncate font-medium"
                                        placeholder="Clase"
                                        value={char.class}
                                        onChange={e => setChar({...char, class: e.target.value})}
                                    />
                                    <span className="text-stone-600">·</span>
                                    <span className="flex items-center gap-1 whitespace-nowrap font-medium">
                                        Nvl
                                        <input
                                            type="number"
                                            className="bg-transparent border-b border-transparent hover:border-stone-700 focus:border-stone-500 w-7 text-center text-white font-bold"
                                            value={char.level}
                                            onChange={e => setChar({...char, level: e.target.value === '' ? '' : parseInt(e.target.value)})}
                                            onFocus={e => e.target.select()}
                                        />
                                    </span>
                                </div>
                                {/* Subtítulo secundario — Trasfondo · Alineación */}
                                <div className="flex items-center gap-1.5 text-[11px] text-stone-500 flex-wrap">
                                    <input
                                        className="bg-transparent border-b border-transparent hover:border-stone-700 focus:border-stone-500 max-w-[6rem] truncate italic"
                                        placeholder="Trasfondo"
                                        value={char.background}
                                        onChange={e => setChar({...char, background: e.target.value})}
                                    />
                                    <button
                                        onClick={() => setShowBgModal(true)}
                                        className="text-stone-500 hover:text-blue-400 flex-shrink-0 transition-colors"
                                        title="Detalles del trasfondo"
                                    ><Icons.Book size={12}/></button>
                                    {char.alignment && <span className="text-stone-600">·</span>}
                                    <input
                                        className="bg-transparent border-b border-transparent hover:border-stone-700 focus:border-stone-500 max-w-[6rem] truncate italic"
                                        placeholder="Alineación"
                                        value={char.alignment || ''}
                                        onChange={e => setChar({...char, alignment: e.target.value})}
                                    />
                                </div>
                            </div>
                        </div>
                        <button onClick={() => setShowRestModal(true)} className="ml-2 bg-stone-800 p-2 rounded-full hover:bg-stone-700 border border-stone-600 text-orange-400 flex-shrink-0 shadow mt-1" title="Descansar"><Icons.Campfire size={22} /></button>
                        <button className="dark-toggle ml-1 mt-1" onClick={toggleDark} title={darkMode ? 'Modo claro' : 'Modo oscuro'}>
                            {darkMode
                                ? <svg viewBox="0 0 24 24" width="18" height="18" fill="#fbbf24" stroke="#fbbf24" strokeWidth="1.5"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                                : <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="#d97706" strokeWidth="1.5"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                            }
                        </button>

            const [activeTab, setActiveTab] = useState('main');
            const [showRestModal, setShowRestModal] = useState(false);
            const [showAvatarModal, setShowAvatarModal] = useState(false);
            const [showBgUploadModal, setShowBgUploadModal] = useState(false);
            const [showSpellForm, setShowSpellForm] = useState(false);
            const [showAttackForm, setShowAttackForm] = useState(false);
            const [showSpellPicker, setShowSpellPicker] = useState(false);
            const [showEquipTypeModal, setShowEquipTypeModal] = useState(false);
            const [equipPickerKind, setEquipPickerKind] = useState(null); // 'equipment' | 'magic_items' | null
            const [editingItem, setEditingItem] = useState(null); // { item, kind: 'spells' | 'equipment' }
            const [pickerToast, setPickerToast] = useState(null);
            const [showBgModal, setShowBgModal] = useState(false);
            const [showNoSlotsModal, setShowNoSlotsModal] = useState(false);
            const [castModalData, setCastModalData] = useState(null);
            const [viewSpell, setViewSpell] = useState(null);
            const [viewAttack, setViewAttack] = useState(null);
            const [previewImage, setPreviewImage] = useState(null);
            const [bgPreviewImage, setBgPreviewImage] = useState(null);

            useEffect(() => {
                DB.getChar(charId).then(async saved => {
                    if (!saved) { onClose(); return; }
                    // Primero: adaptar char del Wizard si aplica
                    const wizardAdapted = migrateCharFromWizard(saved);
                    // Después: migración legacy V2
                    const v2 = migrateCharToV2(wizardAdapted);

                    // Enriquecer hechizos que vinieron del Wizard sin info completa
                    // (vienen con solo {id, index, name, level, source, prepared})
                    const enriched = await enrichSpellsFromSRD(v2);
                    setChar(enriched);
                });
            }, [charId]);

            useEffect(() => {
                if (char) {
                    DB.saveChar(charId, char).catch(e => console.error("Error guardando personaje", e));
                    DB.getLibrary().then(library => {
                        const updatedLibrary = library.map(c => c.id === charId ? { ...c, name: char.name, race: char.race, class: char.class, level: char.level } : c);
                        DB.saveLibrary(updatedLibrary);
                    });
                }
            }, [char, charId]);

            if (!char) return <div className="h-full flex items-center justify-center bg-stone-900 text-white">Cargando...</div>;

            const pb = calculateProficiency(char.level);
            const updateStat = (id, val) => setChar(p => ({ ...p, stats: { ...p.stats, [id]: val === "" ? "" : parseInt(val) } }));
            const toggleProficiency = (id) => setChar(p => ({ ...p, proficiencies: p.proficiencies.includes(id) ? p.proficiencies.filter(x => x !== id) : [...p.proficiencies, id] }));
            const toggleSaveProficiency = (id) => setChar(p => ({ ...p, savingThrows: p.savingThrows.includes(id) ? p.savingThrows.filter(x => x !== id) : [...p.savingThrows, id] }));
            const toggleDeathSave = (type, index) => setChar(p => { const current = p.hp.deathSaves?.[type] || 0; const newVal = (index + 1) === current ? index : index + 1; return { ...p, hp: { ...p.hp, deathSaves: { ...(p.hp.deathSaves||{successes:0, failures:0}), [type]: newVal } } }; });
            const handleImageUpload = async (e, isBg = false) => {
                const file = e.target.files[0]; if (!file) return;
                try {
                    if (isBg) { const resizedBg = await resizeImage(file, 1024, 1024, 0.6); setBgPreviewImage(resizedBg); } 
                    else { const resizedAvatar = await resizeImage(file, 300, 300, 0.7); setPreviewImage(resizedAvatar); }
                } catch (error) { alert("Error al procesar la imagen"); }
            };
            const saveAvatar = () => { if (previewImage) { setChar({...char, profileImage: previewImage}); setShowAvatarModal(false); setPreviewImage(null); } };
            const saveBackground = (opacity, transparentBoxes) => { if (bgPreviewImage) setChar({...char, backgroundUrl: bgPreviewImage, bgOpacity: opacity, boxTransparent: transparentBoxes}); else setChar({...char, bgOpacity: opacity, boxTransparent: transparentBoxes}); setShowBgUploadModal(false); setBgPreviewImage(null); };
            const removeBackground = () => { setChar({...char, backgroundUrl: "", bgOpacity: 0, boxTransparent: false}); setShowBgUploadModal(false); setBgPreviewImage(null); };
            const handleShortRest = () => setShowRestModal(false);
            const handleLongRest = () => { setChar(prev => { const newSlots = { ...prev.spellSlots }; Object.keys(newSlots).forEach(k => newSlots[k] = { ...newSlots[k], used: 0 }); return { ...prev, hp: { ...prev.hp, current: prev.hp.max }, spellSlots: newSlots, hp: { ...prev.hp, current: prev.hp.max, hitDiceUsed: Math.max(0, prev.hp.hitDiceUsed - Math.ceil(prev.hp.hitDiceMax / 2)) } }; }); setShowRestModal(false); };
            const castSpell = (spell) => { if (spell.isCantrip) return; const base = parseInt(spell.level); const avail = []; for(let l=base; l<=9; l++) if(char.spellSlots[l] && char.spellSlots[l].used < char.spellSlots[l].total) avail.push(l); if(avail.length===0) return setShowNoSlotsModal(true); if(avail.length===1 && avail[0]===base) spendSlot(base); else setCastModalData({ spell, availableLevels: avail }); }; 
            const spendSlot = (lvl) => setChar(p => ({...p, spellSlots: {...p.spellSlots, [lvl]: {...p.spellSlots[lvl], used: p.spellSlots[lvl].used + 1}}}));
            const selectBackground = (bg) => { if (!bg) { setChar({ ...char, background: "", backgroundFeature: "" }); } else { const featureText = `[${bg.feature}]\n${bg.desc.split('\n\n')[1] || bg.desc}`; const newProfs = [...char.proficiencies]; bg.skills.forEach(skill => { if (!newProfs.includes(skill)) newProfs.push(skill); }); setChar({ ...char, background: bg.name, backgroundFeature: featureText, proficiencies: newProfs }); } setShowBgModal(false); };

            return (
                <div className="relative w-full h-full bg-stone-900">
                    <MobileShell 
                        char={char} setChar={setChar} activeTab={activeTab} setActiveTab={setActiveTab} onClose={onClose}
                        pb={pb} calculateModifier={calculateModifier}
                        updateStat={updateStat} toggleProficiency={toggleProficiency} toggleSaveProficiency={toggleSaveProficiency} toggleDeathSave={toggleDeathSave}
                        decreaseDice={() => setChar(p => ({...p, hp: {...p.hp, hitDiceUsed: Math.min(p.hp.hitDiceMax, p.hp.hitDiceUsed + 1)}}))}
                        increaseDice={() => setChar(p => ({...p, hp: {...p.hp, hitDiceUsed: Math.max(0, p.hp.hitDiceUsed - 1)}}))}
                        showRestModal={showRestModal} setShowRestModal={setShowRestModal}
                        showAvatarModal={showAvatarModal} setShowAvatarModal={setShowAvatarModal}
                        showBgUploadModal={showBgUploadModal} setShowBgUploadModal={setShowBgUploadModal}
                        showSpellForm={showSpellForm} setShowSpellForm={setShowSpellForm}
                        showSpellPicker={showSpellPicker} setShowSpellPicker={setShowSpellPicker}
                        showEquipTypeModal={showEquipTypeModal} setShowEquipTypeModal={setShowEquipTypeModal}
                        equipPickerKind={equipPickerKind} setEquipPickerKind={setEquipPickerKind}
                        editingItem={editingItem} setEditingItem={setEditingItem}
                        pickerToast={pickerToast} setPickerToast={setPickerToast}
                        showAttackForm={showAttackForm} setShowAttackForm={setShowAttackForm}
                        showBgModal={showBgModal} setShowBgModal={setShowBgModal}
                        showNoSlotsModal={showNoSlotsModal} setShowNoSlotsModal={setShowNoSlotsModal}
                        castModalData={castModalData} setCastModalData={setCastModalData}
                        viewSpell={viewSpell} setViewSpell={setViewSpell}
                        viewAttack={viewAttack} setViewAttack={setViewAttack}
                        viewSpellDetail={setViewSpell} viewAttackDetail={setViewAttack}
                        previewImage={previewImage} setPreviewImage={setPreviewImage}
                        bgPreviewImage={bgPreviewImage} setBgPreviewImage={setBgPreviewImage}
                        handleImageUpload={handleImageUpload} saveAvatar={saveAvatar} saveBackground={saveBackground} removeBackground={removeBackground}
                        handleShortRest={handleShortRest} handleLongRest={handleLongRest}
                        castSpell={castSpell} spendSlot={spendSlot} selectBackground={selectBackground}
                        registerBackHandler={registerBackHandler}
                        darkMode={darkMode} toggleDark={toggleDark}
                    />
                    <DiceRoller registerBackHandler={registerBackHandler} />
                </div>
            );
        };

        const MainMenu = ({ onChangeView, library, onDeleteChar, darkMode, toggleDark }) => {
            const [deleteTarget, setDeleteTarget] = useState(null);
            
            return (
                <div className="flex flex-col h-full bg-stone-900 text-white p-6 overflow-hidden relative">
                    {/* Botón modo oscuro/claro */}
                    <div className="absolute top-6 right-6 z-10">
                        <button className="dark-toggle" onClick={toggleDark} title={darkMode ? 'Modo claro' : 'Modo oscuro'}>
                            {darkMode
                                ? <svg viewBox="0 0 24 24" width="20" height="20" fill="#fbbf24" stroke="#fbbf24" strokeWidth="1.5"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                                : <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#d97706" strokeWidth="1.5"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                            }
                        </button>
                    </div>
                    <div className="flex-1 flex flex-col items-center justify-center animate-fade-in relative w-full">
                        <div className="mb-8 text-6xl">⚔️</div>
                        <h1 className="text-4xl font-serif font-bold text-center mb-2 tracking-widest text-amber-500">LA FORJA</h1>
                        <p className="text-sm text-stone-500 uppercase tracking-widest mb-12">Gestor 5e</p>
                        <button onClick={() => onChangeView('create')} className="w-full max-w-xs bg-red-800 hover:bg-red-700 text-white py-4 rounded-lg font-bold shadow-lg mb-6 flex items-center justify-center gap-3 transition-transform active:scale-95 border border-red-900">
                            <Icons.Plus size={24} /> NUEVO PERSONAJE
                        </button>
                        <button onClick={() => onChangeView('library')} className="w-full max-w-xs bg-indigo-800 hover:bg-indigo-700 text-white py-4 rounded-lg font-bold shadow-lg mb-6 flex items-center justify-center gap-3 transition-transform active:scale-95 border border-indigo-900">
                            <Icons.Library size={24} /> BIBLIOTECA
                        </button>
                        <div className="w-full max-w-xs relative group">
                            <div className="max-h-[40vh] overflow-y-auto pr-2 no-scrollbar space-y-3 pb-8">
                                {library.length === 0 && <p className="text-center text-stone-600 italic">No hay personajes guardados.</p>}
                                {library.map(char => (
                                    <div key={char.id} className="bg-stone-800 border border-stone-700 rounded-lg p-3 flex justify-between items-center group hover:border-stone-500 transition-colors">
                                        <div className="cursor-pointer flex-1" onClick={() => onChangeView('sheet', char.id)}>
                                            <div className="font-serif font-bold text-lg text-stone-200">{char.name || "Sin Nombre"}</div>
                                            <div className="text-xs text-stone-500">{char.race} {char.class} • Nvl {char.level}</div>
                                        </div>
                                        <button onClick={(e) => { e.stopPropagation(); setDeleteTarget(char.id); }} className="text-stone-600 hover:text-red-500 p-2"> <Icons.Trash size={18} /> </button>
                                    </div>
                                ))}
                            </div>
                            {library.length > 3 && <div className="absolute bottom-0 left-0 right-0 h-12 bg-gradient-to-t from-stone-900 to-transparent pointer-events-none"></div>}
                        </div>
                    </div>
                    <div className="mt-auto flex justify-between items-center text-stone-600 pt-6 border-t border-stone-800"> <button onClick={() => onChangeView('about')} className="flex items-center gap-2 hover:text-stone-300 transition-colors text-xs font-bold uppercase"><Icons.Info size={16}/> Acerca de</button> <div className="text-[10px] opacity-50">{CURRENT_VERSION}</div> </div>
                    {deleteTarget && ( <div className="absolute inset-0 bg-black/90 flex items-center justify-center p-6 z-50 animate-fade-in"> <div className="bg-stone-800 border border-stone-600 p-6 rounded-lg text-center w-full max-w-sm shadow-2xl"> <h3 className="text-xl font-serif font-bold text-red-500 mb-2">¿Eliminar Héroe?</h3> <p className="text-stone-400 text-sm mb-6">Esta acción no se puede deshacer.</p> <div className="flex gap-3"> <button onClick={() => setDeleteTarget(null)} className="flex-1 py-3 border border-stone-600 rounded text-stone-400 font-bold">Cancelar</button> <button onClick={() => { onDeleteChar(deleteTarget); setDeleteTarget(null); }} className="flex-1 py-3 bg-red-700 text-white rounded font-bold">Eliminar</button> </div> </div> </div> )}
                </div>
            );
        };

        const AboutScreen = ({ onBack }) => {
            return (
                <div className="h-full bg-stone-900 text-stone-300 p-6 overflow-y-auto">
                    <button onClick={onBack} className="mb-6 flex items-center gap-2 text-stone-500 hover:text-white"><Icons.ArrowLeft /> Volver</button>
                    <h2 className="text-2xl font-serif font-bold text-amber-500 mb-4">Acerca de La Forja</h2>
                    <p className="mb-4 text-lg leading-relaxed"> Desarrollado por <strong className="text-white">{DEV_TAG}</strong>.<br/>Una herramienta creada por fans para fans, diseñada para facilitar la gestión de personajes en tus partidas de rol de mesa. </p>
                    <div className="bg-stone-950 p-4 rounded-lg border border-stone-800 text-xs text-stone-500 leading-normal mb-8"> <h3 className="font-bold text-stone-400 mb-2 uppercase">Licencia & Copyright</h3> <p className="mb-2"> This work includes material taken from the System Reference Document 5.1 (“SRD 5.1”) by Wizards of the Coast LLC and available at https://dnd.wizards.com/resources/systems-reference-document. </p> <p> The SRD 5.1 is licensed under the Creative Commons Attribution 4.0 International License available at https://creativecommons.org/licenses/by/4.0/legalcode. </p> </div>
                    <div className="text-center text-xs text-stone-600"> ¡Que tus tiradas sean naturales de 20! 🎲 </div>
                </div>
            );
        };

        function App() {
            const [view, setView] = useState('menu'); 
            const [library, setLibrary] = useState([]);
            const [activeCharId, setActiveCharId] = useState(null);
            const [darkMode, setDarkMode] = useState(false);
            
            // Aplicar/quitar clase dark-mode al body
            useEffect(() => {
                if (darkMode) {
                    document.body.classList.add('dark-mode');
                } else {
                    document.body.classList.remove('dark-mode');
                }
                DB.setSetting('forja_dark_mode', darkMode);
            }, [darkMode]);

            const toggleDark = () => setDarkMode(d => !d);
            
            const viewRef = useRef(view);
            const childBackHandlerRef = useRef(null);

            useEffect(() => {
                viewRef.current = view;
            }, [view]);

            useEffect(() => {
                const init = async () => {
                    const work = (async () => {
                        await DB.migrateFromLocalStorage();
                        await DB.loadSRDIfNeeded();
                        const savedDark = await DB.getSetting('forja_dark_mode');
                        if (savedDark) setDarkMode(true);
                        const loadedLib = await DB.getLibrary();
                        setLibrary(loadedLib);

                        // Migración legacy dnd_char_v3
                        const oldDataString = localStorage.getItem('dnd_char_v3');
                        if (oldDataString) {
                            const oldCharId = 'legacy_import';
                            const alreadyExists = loadedLib.find(c => c.id === oldCharId);
                            if (!alreadyExists) {
                                try {
                                    const oldChar = JSON.parse(oldDataString);
                                    const newLibraryItem = { id: oldCharId, name: oldChar.name || "Héroe Importado", race: oldChar.race || "Desconocido", class: oldChar.class || "Desconocido", level: oldChar.level || 1 };
                                    const v10Defaults = { name: 'Nuevo Héroe', class: 'Guerrero', race: 'Humano', background: '', backgroundFeature: '', level: 1, backgroundUrl: DEFAULT_BG, profileImage: null, bgOpacity: 0, boxTransparent: false, alignment: '', stats: { str: 10, dex: 10, con: 10, int: 10, wis: 10, cha: 10 }, proficiencies: [], savingThrows: [], hp: { current: 10, max: 10, temp: 0, hitDice: '1d10', hitDiceMax: 1, hitDiceUsed: 0, deathSaves: { successes: 0, failures: 0 } }, ac: 10, speed: 30, initiativeBonus: 0, attacks: [], spells: [], inventory: '', notes: '', money: { cp: 0, sp: 0, ep: 0, gp: 0, pp: 0 }, inspiration: 0, languages: '', spellSlots: { 1: {total:0, used:0}, 2: {total:0, used:0}, 3: {total:0, used:0}, 4: {total:0, used:0}, 5: {total:0, used:0}, 6: {total:0, used:0}, 7: {total:0, used:0}, 8: {total:0, used:0}, 9: {total:0, used:0} } };
                                    const migratedChar = { ...v10Defaults, ...oldChar, stats: { ...v10Defaults.stats, ...(oldChar.stats || {}) }, hp: { ...v10Defaults.hp, ...(oldChar.hp || {}) }, money: { ...v10Defaults.money, ...(oldChar.money || {}) }, spellSlots: { ...v10Defaults.spellSlots, ...(oldChar.spellSlots || {}) }, id: oldCharId };
                                    await DB.saveChar(oldCharId, migratedChar);
                                    const updatedLib = [...loadedLib, newLibraryItem];
                                    await DB.saveLibrary(updatedLib);
                                    setLibrary(updatedLib);
                                    alert("¡Se ha encontrado y recuperado un héroe de la versión antigua!");
                                } catch (e) { console.error("Error migrando personaje antiguo:", e); }
                            }
                        }
                    })();

                    await runLoaderProgress(work);

                    const loader = document.getElementById('app-loader');
                    if (loader) { loader.classList.add('loaded'); setTimeout(() => loader.style.display = 'none', 500); }
                };
                init();
            }, []);

            useEffect(() => {
                const handleHardwareBack = async () => {
                    const currentView = viewRef.current; // Leer la referencia actualizada

                    // NIVEL 1: Modales de hijos (referencia mutable, siempre actual)
                    if (childBackHandlerRef.current) {
                        const handled = childBackHandlerRef.current();
                        if (handled) return; // Si el hijo manejó el evento (cerró un modal), no hacemos nada más.
                    }

                    // NIVEL 2: Navegación de Vistas
                    if (currentView === 'wizard') {
                        // En el wizard, el back debería disparar la confirmación de cierre
                        // El Wizard ya tiene su propio modal; aquí no hacemos nada — el wizard maneja su back
                        return;
                    }
                    if (currentView !== 'menu') {
                        // Si estoy en Hoja, Library o About -> Vuelvo al menú
                        setActiveCharId(null);
                        childBackHandlerRef.current = null; // Limpiamos la referencia al salir
                        setView('menu');
                        // Hack para PWA/Android WebView para evitar cierre forzoso si no es Capacitor puro
                        if(window.history.pushState) {
                             window.history.pushState(null, '', window.location.pathname);
                        }
                    } 
                    // NIVEL 3: Salir de la App
                    else {
                        if (window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.App) {
                            await window.Capacitor.Plugins.App.exitApp();
                        }
                    }
                };

                const setupListener = async () => {
                    if (window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.App) {
                        const { App } = window.Capacitor.Plugins;
                        // Borramos cualquier listener previo para evitar duplicados
                        await App.removeAllListeners('backButton');
                        // Agregamos NUESTRO listener maestro
                        await App.addListener('backButton', handleHardwareBack);
                    }
                };

                setupListener();

                // Limpieza al desmontar (aunque App rara vez se desmonta)
                return () => {
                    if (window.Capacitor?.Plugins?.App) {
                        window.Capacitor.Plugins.App.removeAllListeners('backButton');
                    }
                };
            }, []);

            const handleCreateChar = () => {
                // Abre el Character Wizard (Paso 2 del plan)
                setView('wizard');
            };

            // Callback cuando el Wizard termina con éxito → guarda char y abre la hoja
            const handleWizardComplete = async (charFromWizard) => {
                if (!charFromWizard || !charFromWizard.id) {
                    console.error('[App] Wizard devolvió un char inválido');
                    return;
                }
                const newCharStub = {
                    id:    charFromWizard.id,
                    name:  charFromWizard.name,
                    race:  charFromWizard.race_data?.name || charFromWizard.race || 'Humano',
                    class: charFromWizard.class_data?.name || charFromWizard.class || 'Guerrero',
                    level: charFromWizard.level || 1,
                };
                const newLibrary = [...library, newCharStub];
                setLibrary(newLibrary);
                await DB.saveLibrary(newLibrary);
                await DB.saveChar(charFromWizard.id, charFromWizard);
                setActiveCharId(charFromWizard.id);
                setView('sheet');
            };

            // Callback cuando el Wizard se cierra sin completar
            const handleWizardClose = () => {
                setView('menu');
            };

            // Función legacy — crea char vacío directo sin wizard (ya no se usa)
            const handleCreateCharLegacy = async () => {
                const newId = Date.now().toString();
                const now   = new Date().toISOString();
                const newCharStub = { id: newId, name: "Nuevo Héroe", race: "Humano", class: "Guerrero", level: 1 };
                const newLibrary = [...library, newCharStub];
                setLibrary(newLibrary);
                await DB.saveLibrary(newLibrary);

                const newChar = {
                    ...DEFAULT_CHAR_V2,
                    id: newId,
                    meta: {
                        ...DEFAULT_CHAR_V2.meta,
                        createdAt: now,
                        lastModified: {
                            stats: now, combat: now, spells: now,
                            inventory: now, race: now, class_: now,
                        }
                    }
                };
                await DB.saveChar(newId, newChar);
                setActiveCharId(newId);
                setView('sheet');
            };

            const handleDeleteChar = async (id) => {
                const newLibrary = library.filter(c => c.id !== id);
                setLibrary(newLibrary);
                await DB.saveLibrary(newLibrary);
                await DB.deleteChar(id);
            };

            const handleOpenChar = (id) => { setActiveCharId(id); setView('sheet'); };
            const refreshLibrary = async () => { const loadedLib = await DB.getLibrary(); setLibrary(loadedLib); };

            return (
                <div className="h-full w-full bg-stone-900">
                    {view === 'menu' && ( 
                        <MainMenu 
                            onChangeView={(v, id) => { if (v === 'create') handleCreateChar(); else if (v === 'sheet') handleOpenChar(id); else setView(v); }} 
                            library={library} 
                            onDeleteChar={handleDeleteChar}
                            darkMode={darkMode} toggleDark={toggleDark}
                        /> 
                    )}
                    {view === 'about' && <AboutScreen onBack={() => setView('menu')} />}
                    {view === 'library' && <LibraryManager onClose={() => setView('menu')} darkMode={darkMode} />}
                    {view === 'wizard' && <CharacterWizard darkMode={darkMode} onComplete={handleWizardComplete} onClose={handleWizardClose} />}
                    {view === 'sheet' && activeCharId && ( <CharacterSheet charId={activeCharId} onClose={() => { refreshLibrary(); setActiveCharId(null); setView('menu'); }} registerBackHandler={(fn) => { childBackHandlerRef.current = fn; }} darkMode={darkMode} toggleDark={toggleDark} /> )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
